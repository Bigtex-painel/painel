name: Atualizar Dashboard Bigtex

on:
  # Cron diário às 12h30 UTC = 9h30 BR (Brasil é UTC-3 fixo, sem DST)
  schedule:
    - cron: '30 12 * * *'

  # Botão manual na aba Actions do GitHub
  workflow_dispatch:
    inputs:
      data:
        description: 'Data de referência (YYYY-MM-DD). Vazio = hoje.'
        required: false
        default: ''

# Permissão necessária pro GITHUB_TOKEN poder commitar
permissions:
  contents: write

env:
  TZ: America/Sao_Paulo

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ----------------------------------------------------------------
      # 1. Setup
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-actions.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Definir variáveis de data
        id: date
        run: |
          if [ -n "${{ github.event.inputs.data }}" ]; then
            DATA="${{ github.event.inputs.data }}"
          else
            DATA=$(date +%Y-%m-%d)
          fi
          echo "data=$DATA" >> $GITHUB_OUTPUT
          echo "📅 Data de referência: $DATA"

      # ----------------------------------------------------------------
      # 2. Download INBOX
      # ----------------------------------------------------------------
      - name: Download INBOX do Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_INBOX_ID: ${{ secrets.DRIVE_INBOX_ID }}
        run: |
          python drive_sync.py download-inbox \
            --dest ./inbox \
            --names-out ./inbox_files.txt

      - name: Verificar se INBOX está vazio
        id: check_inbox
        run: |
          if [ ! -s ./inbox_files.txt ]; then
            echo "vazio=true" >> $GITHUB_OUTPUT
            echo "📭 INBOX vazio"
          else
            echo "vazio=false" >> $GITHUB_OUTPUT
            COUNT=$(wc -l < ./inbox_files.txt)
            echo "📬 INBOX com $COUNT arquivo(s)"
          fi

      # ----------------------------------------------------------------
      # 3. Caso INBOX vazio: notifica e termina (sucesso aparente)
      # ----------------------------------------------------------------
      - name: Notificar INBOX vazio
        if: steps.check_inbox.outputs.vazio == 'true'
        env:
          WHATSAPP_PHONE_1: ${{ secrets.WHATSAPP_PHONE_1 }}
          WHATSAPP_APIKEY_1: ${{ secrets.WHATSAPP_APIKEY_1 }}
          WHATSAPP_PHONE_2: ${{ secrets.WHATSAPP_PHONE_2 }}
          WHATSAPP_APIKEY_2: ${{ secrets.WHATSAPP_APIKEY_2 }}
        run: |
          DATA="${{ steps.date.outputs.data }}"
          MSG="📭 Bigtex Dashboard ($DATA): INBOX vazio às 09h30. Mande os xls do dia pra atualizar o painel."
          python notify.py "$MSG"

      # ----------------------------------------------------------------
      # 4. INBOX tem arquivos: download BASES e gera payload
      # ----------------------------------------------------------------
      - name: Download BASES do Drive
        if: steps.check_inbox.outputs.vazio == 'false'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_BASES_ID: ${{ secrets.DRIVE_BASES_ID }}
        run: |
          python drive_sync.py download-bases --dest ./bases

      - name: Rodar gerar_payload.py em modo Actions
        if: steps.check_inbox.outputs.vazio == 'false'
        id: gerar
        # continue-on-error pra captuermos exit code e tomarmos decisão
        # baseada no status.json em vez de matar o job no primeiro erro.
        continue-on-error: true
        run: |
          DATA="${{ steps.date.outputs.data }}"
          mkdir -p ./status ./processados/$DATA
          set +e
          python gerar_payload.py --gerar \
            --inbox-dir ./inbox \
            --bases-dir ./bases \
            --processados-dir ./processados/$DATA \
            --status-json ./status/$DATA.json \
            --data $DATA
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> $GITHUB_OUTPUT
          echo "Exit code do gerar_payload: $EXIT"

      - name: Interpretar status.json
        if: steps.check_inbox.outputs.vazio == 'false'
        id: status
        run: |
          DATA="${{ steps.date.outputs.data }}"
          STATUS_FILE=./status/$DATA.json
          if [ ! -f "$STATUS_FILE" ]; then
            echo "❌ status.json não encontrado — falha catastrófica"
            echo "categoria=catastrofica" >> $GITHUB_OUTPUT
            echo "resumo=status.json não foi gerado" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Lê campos via Python (mais robusto que jq pra unicode)
          python <<'PYEOF' >> $GITHUB_OUTPUT
          import json, os
          with open(os.environ['STATUS_FILE'], encoding='utf-8') as f:
              s = json.load(f)
          sucesso = s.get('sucesso', False)
          erros = s.get('erros', [])
          procs = s.get('processados', [])
          payloads = s.get('payloads_gerados', [])
          if not payloads:
              cat = 'falha_total'
          elif erros:
              cat = 'parcial'
          else:
              cat = 'sucesso'
          resumo = (
              f"{len(procs)} processado(s), {len(erros)} erro(s), "
              f"{len(payloads)} payload(s) gerado(s)"
          )
          print(f'categoria={cat}')
          print(f'resumo={resumo}')
          PYEOF

          echo "Categoria detectada: $(grep ^categoria= $GITHUB_OUTPUT | tail -1)"
        env:
          STATUS_FILE: ./status/${{ steps.date.outputs.data }}.json

      # ----------------------------------------------------------------
      # 5. Sucesso ou parcial: sincroniza Drive + commita
      # ----------------------------------------------------------------
      - name: Upload BASES atualizado para Drive
        if: |
          steps.check_inbox.outputs.vazio == 'false' &&
          (steps.status.outputs.categoria == 'sucesso' ||
           steps.status.outputs.categoria == 'parcial')
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_BASES_ID: ${{ secrets.DRIVE_BASES_ID }}
        run: python drive_sync.py upload-bases --src ./bases

      - name: Limpar INBOX no Drive (arquivos processados)
        if: |
          steps.check_inbox.outputs.vazio == 'false' &&
          (steps.status.outputs.categoria == 'sucesso' ||
           steps.status.outputs.categoria == 'parcial')
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_INBOX_ID: ${{ secrets.DRIVE_INBOX_ID }}
          DRIVE_LIXEIRA_ID: ${{ secrets.DRIVE_LIXEIRA_ID }}
        run: |
          # Só remove os que de fato foram processados (não os que ficaram
          # no INBOX por erro de identificação). Lê do status.json.
          DATA="${{ steps.date.outputs.data }}"
          python <<'PYEOF' > ./processados_origem.txt
          import json
          with open('./status/${{ steps.date.outputs.data }}.json', encoding='utf-8') as f:
              s = json.load(f)
          for op in s.get('processados', []):
              if 'origem' in op:
                  print(op['origem'])
          PYEOF
          echo "Arquivos a remover do INBOX:"
          cat ./processados_origem.txt
          if [ -s ./processados_origem.txt ]; then
            python drive_sync.py clear-inbox --names-file ./processados_origem.txt
          else
            echo "Nada a remover."
          fi

      - name: Commit dos artefatos no repo
        if: steps.check_inbox.outputs.vazio == 'false'
        run: |
          DATA="${{ steps.date.outputs.data }}"
          CATEGORIA="${{ steps.status.outputs.categoria }}"
          RESUMO="${{ steps.status.outputs.resumo }}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage: tudo que pode ter mudado
          git add gestor/payload.js financeiro/payload.js 2>/dev/null || true
          git add status/$DATA.json 2>/dev/null || true
          git add processados/$DATA/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Nenhuma mudança para commitar."
            exit 0
          fi

          MSG="chore: atualização automática $DATA [$CATEGORIA]

          $RESUMO"
          git commit -m "$MSG"
          git push origin HEAD:main
          echo "✅ Commit feito"

      # ----------------------------------------------------------------
      # 6. Notificações de erro (parcial ou falha total)
      # ----------------------------------------------------------------
      - name: Notificar erro parcial
        if: |
          steps.check_inbox.outputs.vazio == 'false' &&
          steps.status.outputs.categoria == 'parcial'
        env:
          WHATSAPP_PHONE_1: ${{ secrets.WHATSAPP_PHONE_1 }}
          WHATSAPP_APIKEY_1: ${{ secrets.WHATSAPP_APIKEY_1 }}
          WHATSAPP_PHONE_2: ${{ secrets.WHATSAPP_PHONE_2 }}
          WHATSAPP_APIKEY_2: ${{ secrets.WHATSAPP_APIKEY_2 }}
        run: |
          DATA="${{ steps.date.outputs.data }}"
          RESUMO="${{ steps.status.outputs.resumo }}"
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="⚠️ Bigtex Dashboard ($DATA): atualização parcial. $RESUMO. Detalhes: $URL"
          python notify.py "$MSG"

      - name: Notificar falha total
        if: |
          steps.check_inbox.outputs.vazio == 'false' &&
          (steps.status.outputs.categoria == 'falha_total' ||
           steps.status.outputs.categoria == 'catastrofica')
        env:
          WHATSAPP_PHONE_1: ${{ secrets.WHATSAPP_PHONE_1 }}
          WHATSAPP_APIKEY_1: ${{ secrets.WHATSAPP_APIKEY_1 }}
          WHATSAPP_PHONE_2: ${{ secrets.WHATSAPP_PHONE_2 }}
          WHATSAPP_APIKEY_2: ${{ secrets.WHATSAPP_APIKEY_2 }}
        run: |
          DATA="${{ steps.date.outputs.data }}"
          RESUMO="${{ steps.status.outputs.resumo }}"
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ Bigtex Dashboard ($DATA): atualização FALHOU. $RESUMO. Ver: $URL"
          python notify.py "$MSG"

      - name: Marcar job como falho se categoria != sucesso/parcial
        if: |
          steps.check_inbox.outputs.vazio == 'false' &&
          (steps.status.outputs.categoria == 'falha_total' ||
           steps.status.outputs.categoria == 'catastrofica')
        run: exit 1

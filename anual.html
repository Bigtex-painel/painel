  out += '<button class="tgl-btn '+(S.topProd==='piores'?'on-red':'')+'" onclick="setTopProd(\'piores\')">Piores</button>';
  out += '</div>';
  out += '<div class="tgl-wrap">';
  out += '<button class="tgl-btn '+(S.ordProd==='fat'?'on':'')+'" onclick="setOrdProd(\'fat\')">Faturamento</button>';
  out += '<button class="tgl-btn '+(S.ordProd==='margem'?'on':'')+'" onclick="setOrdProd(\'margem\')">Margem R$</button>';
  out += '<button class="tgl-btn '+(S.ordProd==='margem_pct'?'on':'')+'" onclick="setOrdProd(\'margem_pct\')">Margem %</button>';
  out += '</div>';
  out += '</div></div>';

  out += '<div class="card">';
  out += '<div class="search-wrap"><span class="klb">Buscar:</span><input id="bprod" class="search-box" value="'+S.busca_prod+'" oninput="setBuscaProd(this.value)" placeholder="descrição do produto…"><span class="search-count">'+produtos.length+' resultado(s)</span></div>';

  // Header de colunas
  if(top10.length>0){
    out += '<div class="tbl-head"><div class="lft col-lbl">Produto</div><div class="rgt">';
    out += '<span class="col-lbl" style="min-width:80px;text-align:right">Qtde</span>';
    out += '<span class="col-lbl" style="min-width:105px;text-align:right">Faturamento</span>';
    out += '<span class="col-lbl" style="min-width:105px;text-align:right">Margem R$</span>';
    out += '<span class="col-lbl" style="min-width:62px;text-align:right">Margem %</span>';
    out += '<span class="col-lbl" style="min-width:70px;text-align:right">Δ vs '+(ano-1)+'</span>';
    out += '</div></div>';
  }

  top10.forEach(function(p, i){
    var marca = S.ordProd;
    // cor semafórica baseada na margem % — aplicada nas 3 colunas
    var corSem = p.margem_pct>=18?'var(--grn)':(p.margem_pct>=10?'var(--yel)':'var(--red)');
    var deltaTxt = '—';
    if(p.delta_pct!==null && p.delta_pct!==undefined){
      var cls = p.delta_pct>0?'up':(p.delta_pct<0?'dn':'neu');
      var seta = p.delta_pct>0?'▲':(p.delta_pct<0?'▼':'•');
      deltaTxt = '<span class="'+cls+'">'+seta+(p.delta_pct>0?'+':'')+f2(p.delta_pct)+'%</span>';
    } else if(p.fat_ant===0){
      deltaTxt = '<span class="up">novo</span>';
    }
    // peso da fonte: coluna ativa do filtro fica bold
    var fwFat  = (marca==='fat')?'700':'400';
    var fwMg   = (marca==='margem')?'700':'400';
    var fwPct  = (marca==='margem_pct')?'700':'400';
    out += '<div class="fr">';
    out += '<div class="lft" title="'+p.p+'"><span style="color:var(--mut);font-family:\'JetBrains Mono\',monospace;font-size:10px;margin-right:6px">'+String(i+1).padStart(2,'0')+'</span>'+p.p+'</div>';
    out += '<div class="rgt">';
    out += '<span style="color:var(--dim);min-width:80px;text-align:right;font-family:\'JetBrains Mono\',monospace">'+f2(p.qtde)+'</span>';
    out += '<span class="vl" style="min-width:105px;text-align:right;color:'+corSem+';font-weight:'+fwFat+'">R$ '+f(p.fat)+'</span>';
    out += '<span style="min-width:105px;text-align:right;color:'+corSem+';font-weight:'+fwMg+';font-family:\'JetBrains Mono\',monospace">R$ '+f(p.margem)+'</span>';
    out += '<span style="color:'+corSem+';min-width:62px;text-align:right;font-weight:'+fwPct+';font-family:\'JetBrains Mono\',monospace">'+f2(p.margem_pct)+'%</span>';
    out += '<span class="delta" style="min-width:70px">'+deltaTxt+'</span>';
    out += '</div></div>';
  });
  if(top10.length===0){
    out += '<div style="padding:10px;color:var(--mut);text-align:center">Nenhum produto encontrado com esse filtro.</div>';
  }

  var totFat = top10.reduce(function(a,x){return a+x.fat;},0);
  var totalAno = produtos.reduce(function(a,x){return a+x.fat;},0);
  var pctTotal = totalAno>0?totFat/totalAno*100:0;
  out += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--brd);font-size:10px;color:var(--dim);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">';
  out += '<span>Soma dos 10: <b style="color:var(--txt);font-family:\'JetBrains Mono\',monospace">R$ '+f(totFat)+'</b></span>';
  out += '<span>Representam <b style="color:var(--blu);font-family:\'JetBrains Mono\',monospace">'+f2(pctTotal)+'%</b> do faturamento '+(S.topProd==='melhores'?'total':'do filtro')+'</span>';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== RETIRADAS SÓCIOS + SOBRA ==========
function renderSocios(){
  var out = '<div class="sc">RETIRADAS DOS SÓCIOS & SOBRA POTENCIAL <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">Thompson Jacon Cavalcante e Glauco Cicero Barbosa · Pro-labore (3.4.07), Salários (3.4.08) e/ou Comissões (2.3.02) conforme o ano · Resultado Gerencial = sobra após pagar sócios = potencial dividendo</small></div>';
  out += '<div class="card">';
  out += '<div class="socbox">';

  // cada ano como card — agora usando totais reais (pro_labore + comissao por fornecedor)
  D.anos.forEach(function(a){
    var dd = getDataAno(a);
    if(!dd) return;
    var det = sociosDetDoPeriodo(a);
    var th = det.Thompson || {pro_labore:0,comissao:0,total:0};
    var gl = det.Glauco   || {pro_labore:0,comissao:0,total:0};
    var ret = (th.total || 0) + (gl.total || 0);
    var res = dd.resultado || 0;
    var totSoma = ret + Math.max(res, 0);
    var pctTh  = totSoma>0 ? (th.total||0)/totSoma*100 : 0;
    var pctGl  = totSoma>0 ? (gl.total||0)/totSoma*100 : 0;
    var pctRes = totSoma>0 ? Math.max(res,0)/totSoma*100 : 0;
    out += '<div class="socyr '+(a===S.ano?'hi':'')+'">';
    out += '<div class="socyrh"><span class="yr">'+a+(a===2026?' YTD':(S.modo==='ytd'?' YTD':''))+'</span><span class="tot">R$ '+f(dd.receita)+' receita</span></div>';
    // Thompson
    out += '<div class="socrow"><span class="nm">Thompson</span><span class="vl" style="color:var(--pur)">R$ '+f(th.total)+'</span></div>';
    // Glauco
    out += '<div class="socrow"><span class="nm">Glauco</span><span class="vl" style="color:var(--cya)">R$ '+f(gl.total)+'</span></div>';
    // Total
    out += '<div class="socrow" style="border-top:1px solid var(--brd);padding-top:6px;margin-top:3px"><span class="nm"><b>Total retiradas</b></span><span class="vl"><b>R$ '+f(ret)+'</b></span></div>';
    var corRes = res>=0?'var(--grn)':'var(--red)';
    out += '<div class="socrow"><span class="nm">Resultado Gerencial (sobra)</span><span class="vl" style="color:'+corRes+';font-weight:700">'+(res<0?'−':'')+'R$ '+f(Math.abs(res))+'</span></div>';
    if(totSoma>0){
      out += '<div class="sobra-bar">';
      if(pctTh>0)  out += '<div style="background:var(--pur);width:'+pctTh+'%" title="Thompson">'+(pctTh>=10?f2(pctTh)+'%':'')+'</div>';
      if(pctGl>0)  out += '<div style="background:var(--cya);width:'+pctGl+'%" title="Glauco">'+(pctGl>=10?f2(pctGl)+'%':'')+'</div>';
      if(pctRes>0) out += '<div style="background:var(--grn);width:'+pctRes+'%" title="Sobra/Dividendo">'+(pctRes>=10?f2(pctRes)+'%':'')+'</div>';
      out += '</div>';
      out += '<div style="font-size:9px;color:var(--mut);margin-top:4px;font-family:\'JetBrains Mono\',monospace">Distribuição de R$ '+f(totSoma)+' (<span style="color:var(--pur)">■</span> Thompson <span style="color:var(--cya)">■</span> Glauco <span style="color:var(--grn)">■</span> Sobra)</div>';
    } else if(res<0){
      out += '<div style="font-size:10px;color:var(--red);margin-top:6px;font-weight:600">⚠ Prejuízo: sócios retiraram mais do que a empresa gerou</div>';
    }
    out += '</div>';
  });

  // ===== Card CONSOLIDADO (soma de todos os anos) =====
  var cTh = 0, cGl = 0, cRec = 0, cRes = 0;
  D.anos.forEach(function(a){
    var dd = getDataAno(a);
    if(!dd) return;
    var det = sociosDetDoPeriodo(a);
    cTh  += ((det.Thompson && det.Thompson.total) || 0);
    cGl  += ((det.Glauco && det.Glauco.total) || 0);
    cRec += dd.receita || 0;
    cRes += dd.resultado || 0;
  });
  var cRet = cTh + cGl;
  var cTot = cRet + Math.max(cRes, 0);
  var cPctTh  = cTot>0 ? cTh/cTot*100 : 0;
  var cPctGl  = cTot>0 ? cGl/cTot*100 : 0;
  var cPctRes = cTot>0 ? Math.max(cRes,0)/cTot*100 : 0;
  var periodoTxt = (D.anos[0]) + '–' + (D.anos[D.anos.length-1]);
  out += '<div class="socyr" style="border:1px solid var(--blu);background:rgba(88,166,255,0.04)">';
  out += '<div class="socyrh"><span class="yr" style="color:var(--blu)">CONSOLIDADO <span style="font-size:10px;color:var(--mut);font-weight:500">('+periodoTxt+')</span></span><span class="tot">R$ '+f(cRec)+' receita</span></div>';
  out += '<div class="socrow"><span class="nm">Thompson</span><span class="vl" style="color:var(--pur)">R$ '+f(cTh)+'</span></div>';
  out += '<div class="socrow"><span class="nm">Glauco</span><span class="vl" style="color:var(--cya)">R$ '+f(cGl)+'</span></div>';
  out += '<div class="socrow" style="border-top:1px solid var(--brd);padding-top:6px;margin-top:3px"><span class="nm"><b>Total retiradas</b></span><span class="vl"><b>R$ '+f(cRet)+'</b></span></div>';
  var cCorRes = cRes>=0?'var(--grn)':'var(--red)';
  out += '<div class="socrow"><span class="nm">Resultado Gerencial (sobra)</span><span class="vl" style="color:'+cCorRes+';font-weight:700">'+(cRes<0?'−':'')+'R$ '+f(Math.abs(cRes))+'</span></div>';
  if(cTot>0){
    out += '<div class="sobra-bar">';
    if(cPctTh>0)  out += '<div style="background:var(--pur);width:'+cPctTh+'%" title="Thompson">'+(cPctTh>=10?f2(cPctTh)+'%':'')+'</div>';
    if(cPctGl>0)  out += '<div style="background:var(--cya);width:'+cPctGl+'%" title="Glauco">'+(cPctGl>=10?f2(cPctGl)+'%':'')+'</div>';
    if(cPctRes>0) out += '<div style="background:var(--grn);width:'+cPctRes+'%" title="Sobra/Dividendo">'+(cPctRes>=10?f2(cPctRes)+'%':'')+'</div>';
    out += '</div>';
    // comparativo direto Thompson vs Glauco
    var difAbs = cGl - cTh;
    var difPct = cTh>0 ? ((cGl-cTh)/cTh*100) : null;
    var corDif = difAbs>=0 ? 'var(--cya)' : 'var(--pur)';
    var quem = difAbs>=0 ? 'Glauco retirou mais' : 'Thompson retirou mais';
    var detDif = 'R$ '+f(Math.abs(difAbs)) + (difPct!==null ? ' ('+(difAbs>=0?'+':'−')+f2(Math.abs(difPct))+'%)' : '');
    out += '<div style="font-size:10px;color:var(--mut);margin-top:6px;line-height:1.5">';
    out += '<div style="font-family:\'JetBrains Mono\',monospace">Distribuição de R$ '+f(cTot)+' (<span style="color:var(--pur)">■</span> Thompson <span style="color:var(--cya)">■</span> Glauco <span style="color:var(--grn)">■</span> Sobra)</div>';
    out += '<div style="margin-top:3px"><b style="color:'+corDif+'">'+quem+'</b>: '+detDif+' no período</div>';
    out += '</div>';
  }
  out += '</div>';

  out += '</div>';

  // ----- Gráfico comparativo entre sócios (barras agrupadas) -----
  out += '<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--brd)">';
  out += '<div class="klb" style="margin-bottom:8px">COMPARATIVO DE RETIRADAS POR SÓCIO <span style="color:var(--mut);font-weight:400;text-transform:none">(R$ total: pro-labore + comissão por fornecedor)</span></div>';
  out += svgSociosComparativo();
  out += '</div>';

  out += '</div>';
  return out;
}

// ========== SVG barras agrupadas Thompson x Glauco por ano ==========
function svgSociosComparativo(){
  var W = 900, H = 260;
  var mgT = 28, mgB = 44, mgL = 60, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // coletar valores por sócio
  var rows = D.anos.map(function(a){
    var det = sociosDetDoPeriodo(a);
    return {
      ano: a,
      th:  (det.Thompson && det.Thompson.total) || 0,
      gl:  (det.Glauco && det.Glauco.total) || 0,
    };
  });
  var maxV = 0;
  rows.forEach(function(r){ if(r.th>maxV) maxV=r.th; if(r.gl>maxV) maxV=r.gl; });
  if(maxV===0) maxV = 1;
  var yTop = maxV * 1.12;

  function niceTickStep(range, approxTicks){
    if(range<=0) return 1;
    var raw = range / approxTicks;
    var p = Math.pow(10, Math.floor(Math.log10(raw)));
    var n_ = raw/p;
    var step = n_<1.5?1:(n_<3?2:(n_<7?5:10));
    return step * p;
  }
  var stepY = niceTickStep(yTop, 4);
  var yTicks = [];
  for(var tk=0; tk*stepY <= yTop + stepY*0.01; tk++){ yTicks.push(tk*stepY); }
  if(yTicks[yTicks.length-1] < yTop){ yTicks.push(yTicks[yTicks.length-1]+stepY); }
  var yTopReal = yTicks[yTicks.length-1];

  // geometria — duas barras por grupo (Thompson em roxo, Glauco em ciano)
  var bandW = plotW / n;
  var gap = Math.max(18, bandW * 0.28);   // espaço entre grupos
  var innerGap = 4;                        // espaço entre as 2 barras do mesmo grupo
  var grupoW = bandW - gap;
  var barW = (grupoW - innerGap) / 2;
  function xGrupo(i){ return mgL + i*bandW + gap/2; }
  function yPos(v){ return mgT + plotH - (v/yTopReal)*plotH; }

  var s = '<div style="width:100%">';
  s += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // gradientes
  s += '<defs>';
  s += '<linearGradient id="gradSocTh" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#d7b8ff" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#a277f0" stop-opacity="1"/>';
  s += '<stop offset="100%" stop-color="#6a4bb3" stop-opacity="0.95"/>';
  s += '</linearGradient>';
  s += '<linearGradient id="gradSocGl" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#7de8d8" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#39d2c0" stop-opacity="1"/>';
  s += '<stop offset="100%" stop-color="#1a8c7f" stop-opacity="0.95"/>';
  s += '</linearGradient>';
  s += '</defs>';

  // grid + labels Y
  yTicks.forEach(function(v){
    var y = yPos(v);
    s += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    s += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">R$ '+fk(v)+'</text>';
  });

  // barras
  rows.forEach(function(r, i){
    var x0 = xGrupo(i);
    // Thompson
    if(r.th>0){
      var yTh = yPos(r.th);
      var hTh = mgT+plotH - yTh;
      s += '<rect x="'+x0+'" y="'+yTh+'" width="'+barW+'" height="'+hTh+'" rx="3" ry="3" fill="url(#gradSocTh)"/>';
      s += '<text x="'+(x0+barW/2)+'" y="'+(yTh-5)+'" text-anchor="middle" fill="var(--pur)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">'+fk(r.th)+'</text>';
    }
    // Glauco
    if(r.gl>0){
      var xGl = x0+barW+innerGap;
      var yGl = yPos(r.gl);
      var hGl = mgT+plotH - yGl;
      s += '<rect x="'+xGl+'" y="'+yGl+'" width="'+barW+'" height="'+hGl+'" rx="3" ry="3" fill="url(#gradSocGl)"/>';
      s += '<text x="'+(xGl+barW/2)+'" y="'+(yGl-5)+'" text-anchor="middle" fill="var(--cya)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">'+fk(r.gl)+'</text>';
    }
    // label do ano embaixo do grupo
    var ehCur = (r.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    var xCentro = x0 + grupoW/2;
    s += '<text x="'+xCentro+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+r.ano+(r.ano===2026?' YTD':'')+'</text>';
  });

  s += '</svg></div>';
  // legenda
  s += '<div style="display:flex;gap:16px;justify-content:center;margin-top:4px;font-size:11px;color:var(--dim);font-weight:600">';
  s += '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:4px;border-radius:2px;background:var(--pur)"></span>Thompson</span>';
  s += '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:4px;border-radius:2px;background:var(--cya)"></span>Glauco</span>';
  s += '</div>';
  return s;
}

// ========== CONCENTRAÇÃO TOP 5 AO LONGO DOS ANOS ==========
function renderConcentracao(){
  var out = '<div class="sc">EVOLUÇÃO DA CONCENTRAÇÃO (TOP 5 CLIENTES)</div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:8px">% que os 5 maiores clientes representam do faturamento (quanto menor, mais diversificado) <span style="color:var(--yel);margin-left:6px">• limites: 30% e 50%</span></div>';

  // para cada ano: calcula % de concentração e guarda o top 5 (nome+fat) para o tooltip
  var top5Ano = {};
  var pcts = D.anos.map(function(a){
    var cl = topCliDoPeriodo(a);
    var top5arr = cl.slice(0,5);
    var top5 = top5arr.reduce(function(ac,x){return ac+x.fat;},0);
    var total = cl.reduce(function(ac,x){return ac+x.fat;},0);
    top5Ano[a] = top5arr.map(function(x){
      // primeiro "nome" = primeira palavra significativa (razão social costuma começar com pessoa ou empresa)
      var nome = String(x.c||'').trim().split(/\s+/)[0];
      return {n: nome, v: x.fat};
    });
    return total>0 ? top5/total*100 : 0;
  });
  var LIM_OK = 30;   // abaixo = verde (diversificado)
  var LIM_BAD = 50;  // acima = vermelho (alta dependência)

  // dimensões SVG responsivas via aspect-ratio
  var W = 900, H = 260;
  var mgT = 30, mgB = 44, mgL = 46, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // topo: max(valores, 60%) + folga de 12%
  var maxV = Math.max.apply(null, pcts.concat([60]));
  var yTop = maxV * 1.12;
  function xPos(i){ return mgL + (plotW / (n - 1)) * i; }
  function yPos(v){ return mgT + plotH - (v / yTop) * plotH; }

  // cor por faixa: <30 grn, 30-50 yel, ≥50 red
  function corFaixa(v){
    if(v>=LIM_BAD) return 'var(--red)';
    if(v>=LIM_OK)  return 'var(--yel)';
    return 'var(--grn)';
  }

  out += '<div style="width:100%">';
  out += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // ---- defs: três gradientes verticais (verde, amarelo, vermelho) ----
  out += '<defs>';
  out += '<linearGradient id="gradConOk" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#3fb950" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradConWarn" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#d29922" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#d29922" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradConBad" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#f85149" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#f85149" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  // clipPaths: 3 faixas verticais definidas pelas linhas 30% e 50%
  var yOk = yPos(LIM_OK);
  var yBad = yPos(LIM_BAD);
  out += '<clipPath id="clipZonaOk"><rect x="0" y="'+yOk+'" width="'+W+'" height="'+(mgT + plotH - yOk)+'"/></clipPath>';
  out += '<clipPath id="clipZonaWarn"><rect x="0" y="'+yBad+'" width="'+W+'" height="'+(yOk - yBad)+'"/></clipPath>';
  out += '<clipPath id="clipZonaBad"><rect x="0" y="'+mgT+'" width="'+W+'" height="'+(yBad - mgT)+'"/></clipPath>';
  out += '</defs>';

  // ---- grid horizontal + labels do eixo Y ----
  var yTicks = 4;
  for(var g=0; g<=yTicks; g++){
    var v = yTop * g / yTicks;
    var y = yPos(v);
    out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    out += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+f2(v)+'%</text>';
  }

  // ---- linhas dos limites (30% verde-amarelo / 50% amarelo-vermelho) — tracejadas ----
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yOk+'" y2="'+yOk+'" stroke="var(--grn)" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yOk-6)+'" text-anchor="end" fill="var(--grn)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 30%</text>';
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yBad+'" y2="'+yBad+'" stroke="var(--red)" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yBad-6)+'" text-anchor="end" fill="var(--red)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 50%</text>';

  // ---- pontos ----
  var pts = [];
  D.anos.forEach(function(a, i){
    pts.push({ano:a, v:pcts[i], x:xPos(i), y:yPos(pcts[i])});
  });

  // ---- área preenchida, recortada em 3 faixas ----
  var areaD = 'M '+pts[0].x+' '+(mgT+plotH)+' ';
  pts.forEach(function(p){ areaD += 'L '+p.x+' '+p.y+' '; });
  areaD += 'L '+pts[pts.length-1].x+' '+(mgT+plotH)+' Z';
  out += '<path d="'+areaD+'" fill="url(#gradConOk)"   clip-path="url(#clipZonaOk)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradConWarn)" clip-path="url(#clipZonaWarn)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradConBad)"  clip-path="url(#clipZonaBad)"/>';

  // ---- linha: segmentos coloridos por faixa (quebra no cruzamento de cada limite) ----
  function interpY(a, b, yAlvo){
    // retorna x onde o segmento ab cruza y=yAlvo (assumindo cruzamento existe)
    var t = (yAlvo - a.y) / (b.y - a.y);
    return a.x + (b.x - a.x) * t;
  }
  for(var si=0; si<pts.length-1; si++){
    var a = pts[si], b = pts[si+1];
    // identifica cruzamentos desse segmento com os 2 limites
    var cruzou = [];
    [LIM_OK, LIM_BAD].forEach(function(lim){
      if((a.v - lim) * (b.v - lim) < 0){
        var yL = yPos(lim);
        cruzou.push({x:interpY(a,b,yL), y:yL, v:lim});
      }
    });
    // ordena cruzamentos ao longo do segmento (por x crescente se b.x>a.x)
    cruzou.sort(function(p1,p2){return (b.x>a.x?1:-1)*(p1.x-p2.x);});
    // desenha sub-segmentos
    var sub = [a].concat(cruzou).concat([b]);
    for(var sj=0; sj<sub.length-1; sj++){
      var s1 = sub[sj], s2 = sub[sj+1];
      // cor do sub-segmento: usa o valor do ponto médio (mais estável que extremos)
      var vMid = (s1===a ? a.v : s1.v) + ((s2===b ? b.v : s2.v) - (s1===a ? a.v : s1.v)) * 0.5;
      // como s1/s2 podem ser cruzamentos (com v=LIM), usamos a faixa correspondente ao "lado" da curva
      // abordagem simples: pega o valor médio em y e converte
      var yMid = (s1.y + s2.y) / 2;
      var vAtMid = yTop - (yMid - mgT)/plotH*yTop;
      var cor = corFaixa(vAtMid);
      out += '<line x1="'+s1.x+'" y1="'+s1.y+'" x2="'+s2.x+'" y2="'+s2.y+'" stroke="'+cor+'" stroke-width="1.5" stroke-linecap="round"/>';
    }
  }

  // ---- pontos + label do valor ----
  pts.forEach(function(p){
    var cor = corFaixa(p.v);
    // dados JSON dos top 5 deste ano, codificados com escape mínimo para caber em atributo
    var lst = top5Ano[p.ano] || [];
    var dados = lst.map(function(x){return (x.n||'').replace(/"/g,'')+'|'+Math.round(x.v);}).join(';;');
    // círculo visível
    out += '<circle class="con-dot" data-ano="'+p.ano+'" data-top5="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#0d1117" stroke="'+cor+'" stroke-width="1.8" style="cursor:pointer"/>';
    // área de clique maior invisível sobre o círculo (hit area)
    out += '<circle class="con-dot con-hit" data-ano="'+p.ano+'" data-top5="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent" style="cursor:pointer"/>';
    out += '<text x="'+p.x+'" y="'+(p.y - 12)+'" text-anchor="middle" fill="'+cor+'" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">'+f2(p.v)+'%</text>';
  });

  // ---- eixo X: anos ----
  pts.forEach(function(p){
    var ehCur = (p.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    out += '<text x="'+p.x+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+p.ano+(p.ano===2026?' YTD':'')+'</text>';
  });

  out += '</svg>';
  out += '</div>';

  out += '<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">';
  out += '<span style="color:var(--grn)">Verde</span>: &lt;30% — diversificada. ';
  out += '<span style="color:var(--yel)">Amarelo</span>: 30-50% — atenção. ';
  out += '<span style="color:var(--red)">Vermelho</span>: ≥50% — alta dependência.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== DESPESAS POR CATEGORIA ==========
function renderDespesas(){
  var ano = S.ano;
  var cats = getDespCatsFullAno(ano);
  var catsAnt = getDespCatsFullAno(ano-1);
  // mapear anterior por descrição
  var catsAntMap = {};
  catsAnt.forEach(function(c){ catsAntMap[c.d] = c.v; });

  var totalAno = cats.reduce(function(a,c){return a+c.v;},0);
  var maxVal = Math.max.apply(null, cats.map(function(c){return c.v;}).concat([1]));

  var out = '<div class="sc">DESPESAS POR SUB-CONTA — '+nomeAno(ano)+' <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">'+cats.length+' sub-contas ordenadas por valor · Δ vs '+(ano-1)+'</small></div>';
  out += '<div class="card">';

  if(cats.length===0){
    out += '<div style="padding:10px;color:var(--mut);text-align:center">Sem dados de despesas.</div>';
    out += '</div>';
    return out;
  }

  // Header
  out += '<div class="prog-head"><span class="col-lbl">Sub-conta</span><span><span class="col-lbl" style="margin-right:16px">Valor</span><span class="col-lbl" style="margin-right:10px">% Total</span><span class="col-lbl">Δ vs '+(ano-1)+'</span></span></div>';

  cats.forEach(function(c){
    var pct = totalAno>0 ? c.v/totalAno*100 : 0;
    var pctBar = maxVal>0 ? c.v/maxVal*100 : 0;
    var prev = catsAntMap[c.d];
    var deltaTxt = '<span class="prdelta neu">novo</span>';
    if(prev !== undefined && prev > 0){
      var d_ = (c.v-prev)/prev*100;
      // despesa aumentou = ruim (vermelho ▲), caiu = bom (verde ▼)
      var cls = d_<0?'up':(d_>0?'dn':'neu');
      var seta = d_>0?'▲':(d_<0?'▼':'•');
      deltaTxt = '<span class="prdelta '+cls+'">'+seta+(d_>0?'+':'')+f2(d_)+'%</span>';
    }
    out += '<div class="prog">';
    out += '<div class="prh"><span class="cat">'+c.d+' <span style="color:var(--mut);font-size:10px;font-family:\'JetBrains Mono\',monospace">('+c.g+')</span></span>';
    out += '<span style="display:flex;align-items:center;gap:10px;flex-shrink:0">';
    out += '<span class="prv" style="min-width:92px;text-align:right">R$ '+f(c.v)+'</span>';
    out += '<span style="color:var(--dim);font-size:10px;font-family:\'JetBrains Mono\',monospace;min-width:48px;text-align:right">'+f2(pct)+'%</span>';
    out += '<span style="min-width:72px;text-align:right">'+deltaTxt+'</span>';
    out += '</span>';
    out += '</div>';
    out += '<div class="prb"><div class="prf" style="width:'+pctBar+'%;background:'+c.co+'"></div></div>';
    out += '</div>';
  });

  out += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--brd);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">';
  out += '<span>'+cats.length+' sub-contas com movimentação no período</span>';
  out += '<span>Total: <b style="color:var(--txt);font-family:\'JetBrains Mono\',monospace">R$ '+f(totalAno)+'</b></span>';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== PMR / PMP ==========
function renderPmrPmp(){
  var lbl = labelPeriodo();
  // escala de cor para Atraso PMR / Atraso PMP (em dias, valor absoluto)
  function corAtraso(d){
    if(d===null||d===undefined||isNaN(d)) return 'var(--mut)';
    var v = Math.abs(d);
    if(v<2)  return 'var(--grn)';
    if(v<5)  return 'var(--yel)';
    if(v<10) return 'var(--ora)';
    return 'var(--red)';
  }
  // cor do Ciclo (PMP-PMR): positivo = verde, negativo = vermelho
  function corCiclo(d){
    if(d===null||d===undefined||isNaN(d)) return 'var(--mut)';
    return d>=0 ? 'var(--grn)' : 'var(--red)';
  }
  var out = '<div class="sc">PRAZOS MÉDIOS — RECEBIMENTO & PAGAMENTO <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">'+lbl+' · ponderado por valor</small></div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:10px">Evolução do PMR (dias até receber do cliente) e PMP (dias até pagar o fornecedor) — quanto maior o PMP em relação ao PMR, melhor o fluxo de caixa</div>';
  out += '<div class="tblwrap"><table class="dre"><thead><tr><th class="l">Ano</th><th>PMR Concedido</th><th>PMR Efetivo</th><th>Atraso PMR</th><th>PMP Concedido</th><th>PMP Efetivo</th><th>Atraso PMP</th><th>Ciclo (PMP−PMR)</th></tr></thead><tbody>';
  D.anos.forEach(function(a){
    var p = pmrPmpDoPeriodo(a);
    if(!p) return;
    var atrasoR = (p.pmr_efetivo!==null && p.pmr_concedido!==null)?(p.pmr_efetivo-p.pmr_concedido):null;
    var atrasoP = (p.pmp_efetivo!==null && p.pmp_concedido!==null)?(p.pmp_efetivo-p.pmp_concedido):null;
    var ciclo = (p.pmp_efetivo!==null && p.pmr_efetivo!==null)?(p.pmp_efetivo-p.pmr_efetivo):null;
    var corAtR  = corAtraso(atrasoR);
    var corAtP  = corAtraso(atrasoP);
    var corCic  = corCiclo(ciclo);
    out += '<tr'+(a===S.ano?' style="background:var(--card-h)"':'')+'>';
    out += '<td class="l"><b>'+a+'</b></td>';
    out += '<td class="vl" style="color:var(--blu)">'+(p.pmr_concedido!==null?f2(p.pmr_concedido)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--blu)">'+(p.pmr_efetivo!==null?f2(p.pmr_efetivo)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corAtR+'">'+(atrasoR!==null?(atrasoR>=0?'+':'')+f2(atrasoR)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--cya)">'+(p.pmp_concedido!==null?f2(p.pmp_concedido)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--cya)">'+(p.pmp_efetivo!==null?f2(p.pmp_efetivo)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corAtP+'">'+(atrasoP!==null?(atrasoP>=0?'+':'')+f2(atrasoP)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corCic+'"><b>'+(ciclo!==null?(ciclo>=0?'+':'')+f2(ciclo)+' d':'—')+'</b></td>';
    out += '</tr>';
  });
  out += '</tbody></table></div>';
  out += '<div style="font-size:10px;color:var(--mut);margin-top:10px;line-height:1.55">';
  out += '<b style="color:var(--txt)">PMR</b>: média (ponderada por valor) dos dias entre emissão e recebimento do cliente. <b style="color:var(--txt)">PMP</b>: idem para pagamento ao fornecedor (excluindo pessoal e investimentos). ';
  out += '<b style="color:var(--txt)">Atraso</b>: diferença entre efetivo e concedido (quanto atrasou em relação ao combinado). ';
  out += '<b style="color:var(--txt)">Ciclo positivo</b>: paga depois de receber (bom para caixa). ';
  out += '<b style="color:var(--txt)">Ciclo negativo</b>: paga antes de receber (precisa de capital de giro). ';
  out += 'Em <b>2023/2024</b> o atraso alto no PMP reflete principalmente o atraso com a ICAC e outros fornecedores de matéria-prima.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== INADIMPLÊNCIA ==========
function renderInadimplencia(){
  var out = '<div class="sc">INADIMPLÊNCIA (VENCIDOS NÃO PAGOS)</div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:8px">% do faturamento por ano de recebimentos em aberto <span style="color:var(--yel);margin-left:6px">• limite: &lt; 2%</span></div>';

  // coleta % e detalhes (valor em R$ e total faturado) para cada ano
  var inadDet = {};
  var pcts = D.anos.map(function(a){
    var i = inadDoPeriodo(a);
    inadDet[a] = {
      pct: i?i.pct:0,
      inad: i?i.inadimplente:0,
      total: i?i.total_faturado:0
    };
    return i?i.pct:0;
  });
  var META = 2.0;

  // dimensões SVG — responsivo via aspect-ratio
  var W = 900, H = 260;
  var mgT = 30, mgB = 44, mgL = 46, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // escala Y: topo = max(valores, limite*2) + 10% folga
  var maxV = Math.max.apply(null, pcts.concat([META * 2]));
  var yTop = maxV * 1.12;
  function xPos(i){ return mgL + (plotW / (n - 1)) * i; }
  function yPos(v){ return mgT + plotH - (v / yTop) * plotH; }

  out += '<div style="width:100%">';
  out += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // ---- defs: gradientes verde e vermelho para a área ----
  out += '<defs>';
  out += '<linearGradient id="gradInadOk" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#3fb950" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradInadBad" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#f85149" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#f85149" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  // clipPaths: dividir a área em "abaixo do limite" e "acima do limite"
  out += '<clipPath id="clipAcimaMeta"><rect x="0" y="'+mgT+'" width="'+W+'" height="'+(yPos(META) - mgT)+'"/></clipPath>';
  out += '<clipPath id="clipAbaixoMeta"><rect x="0" y="'+yPos(META)+'" width="'+W+'" height="'+(mgT + plotH - yPos(META))+'"/></clipPath>';
  out += '</defs>';

  // ---- grid horizontal + labels do eixo Y ----
  var yTicks = 4;
  for(var g=0; g<=yTicks; g++){
    var v = yTop * g / yTicks;
    var y = yPos(v);
    out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    out += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+f2(v)+'%</text>';
  }

  // ---- linha do limite (2%) — tracejada amarela, atravessa todo o plot ----
  var yMeta = yPos(META);
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yMeta+'" y2="'+yMeta+'" stroke="var(--yel)" stroke-width="1" stroke-dasharray="5,4" opacity="0.75"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yMeta-6)+'" text-anchor="end" fill="var(--yel)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 2,00%</text>';

  // ---- pontos reais ----
  var pts = [];
  D.anos.forEach(function(a, i){
    pts.push({ano:a, v:pcts[i], x:xPos(i), y:yPos(pcts[i])});
  });

  // ---- área preenchida (caminho fechado até a baseline) ----
  // construir polyline dos pontos da curva
  var curva = pts.map(function(p){ return p.x+','+p.y; }).join(' ');
  var xFim = pts[pts.length-1].x;
  var xIni = pts[0].x;
  var baseY = mgT + plotH;
  var areaPath = 'M '+xIni+','+baseY+' L ' + curva.replace(/,/g,' ').replace(/ /g,',').replace(/,/g,' ') + ' L '+xFim+','+baseY+' Z';
  // Aproximação mais simples:
  var areaD = 'M '+xIni+' '+baseY+' ';
  pts.forEach(function(p){ areaD += 'L '+p.x+' '+p.y+' '; });
  areaD += 'L '+xFim+' '+baseY+' Z';

  // desenhar a mesma área duas vezes, com clipPaths diferentes (verde abaixo, vermelho acima da meta)
  out += '<path d="'+areaD+'" fill="url(#gradInadOk)"  clip-path="url(#clipAbaixoMeta)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradInadBad)" clip-path="url(#clipAcimaMeta)"/>';

  // ---- linha (segmentos coloridos por posição relativa à meta) ----
  // se um segmento cruza a meta, dividir em dois no ponto exato
  function corPos(v){ return v > META ? 'var(--red)' : 'var(--grn)'; }
  for(var si=0; si<pts.length-1; si++){
    var a = pts[si], b = pts[si+1];
    var cruzaMeta = (a.v > META) !== (b.v > META);
    if(cruzaMeta){
      // interpolar ponto de cruzamento
      var t = (META - a.v) / (b.v - a.v);
      var xC = a.x + (b.x - a.x) * t;
      var yC = yMeta;
      out += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+xC+'" y2="'+yC+'" stroke="'+corPos(a.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
      out += '<line x1="'+xC+'" y1="'+yC+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+corPos(b.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
    } else {
      out += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+corPos(b.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
    }
  }

  // ---- pontos com fill escuro + borda colorida + label do % acima ----
  pts.forEach(function(p){
    var cor = corPos(p.v);
    var det = inadDet[p.ano] || {pct:0, inad:0, total:0};
    var dados = Math.round(det.inad)+'|'+Math.round(det.total);
    // círculo visível
    out += '<circle class="inad-dot" data-ano="'+p.ano+'" data-inad="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#0d1117" stroke="'+cor+'" stroke-width="1.8" style="cursor:pointer"/>';
    // área de hit invisível
    out += '<circle class="inad-dot" data-ano="'+p.ano+'" data-inad="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent" style="cursor:pointer"/>';
    // label do valor: acima do ponto
    out += '<text x="'+p.x+'" y="'+(p.y - 12)+'" text-anchor="middle" fill="'+cor+'" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">'+f2(p.v)+'%</text>';
  });

  // ---- eixo X: anos ----
  pts.forEach(function(p){
    var ehCur = (p.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    out += '<text x="'+p.x+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+p.ano+(p.ano===2026?' YTD':'')+'</text>';
  });

  out += '</svg>';
  out += '</div>';

  out += '<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">';
  out += '<b style="color:var(--txt)">Limite tracejado em 2%</b>: teto de tolerância. ';
  out += '<span style="color:var(--grn)">Verde</span>: dentro do aceitável. ';
  out += '<span style="color:var(--red)">Vermelho</span>: acima do limite. ';
  out += 'Obs.: 2026 ainda tem muitos recebíveis em aberto — valor inicial, tende a cair conforme os pagamentos entram.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== ALERTAS ESTRATÉGICOS ==========
function renderAlertas(){
  var ano = S.ano;
  var d = getDataAno(ano);
  var dAnt = getDataAno(ano-1);
  var alertas = [];

  // Concentração Top 5
  var clientes = getTopCliAno(ano);
  var top5 = clientes.slice(0,5).reduce(function(a,x){return a+x.fat;},0);
  var totalCli = clientes.reduce(function(a,x){return a+x.fat;},0);
  var pctCon = totalCli>0 ? top5/totalCli*100 : 0;
  if(pctCon>=60){
    alertas.push({t:'cr', b:'Concentração crítica em 5 clientes ('+f2(pctCon)+'%)', d:'perder um dos top 5 impacta severamente o caixa. Prioridade: diversificar carteira.'});
  } else if(pctCon>=45){
    alertas.push({t:'wa', b:'Concentração elevada em 5 clientes ('+f2(pctCon)+'%)', d:'monitorar e buscar diversificação de base.'});
  }

  // Queda de margem bruta
  if(dAnt && d.margem_bruta < dAnt.margem_bruta - 2){
    alertas.push({t:'wa', b:'Margem Bruta caiu '+f2(dAnt.margem_bruta - d.margem_bruta)+'pp vs ano anterior', d:'de '+f2(dAnt.margem_bruta)+'% para '+f2(d.margem_bruta)+'% — revisar precificação ou custos.'});
  }
  // Resultado negativo
  if(d.resultado < 0){
    alertas.push({t:'cr', b:'Resultado Gerencial negativo (R$ '+f(Math.abs(d.resultado))+' de prejuízo)', d:'empresa gerou menos do que gastou no período — atenção imediata.'});
  }
  // Crescimento forte
  if(dAnt && d.receita > dAnt.receita * 1.3){
    var pct = (d.receita/dAnt.receita-1)*100;
    alertas.push({t:'ok', b:'Crescimento forte de receita (+'+f2(pct)+'% vs ano anterior)', d:'acelerar operação e monitorar capital de giro para sustentar o ritmo.'});
  }
  // Retiradas sócios > resultado
  var ret = d.retiradas_socios || 0;
  var res = d.resultado || 0;
  if(ret > 0 && res > 0 && ret > res * 2){
    alertas.push({t:'wa', b:'Retiradas dos sócios muito acima do resultado', d:'retiradas de R$ '+f(ret)+' para um resultado de R$ '+f(res)+' — reservar parte como dividendo futuro?'});
  }
  if(ret > 0 && res < 0){
    alertas.push({t:'cr', b:'Sócios retirando com empresa no prejuízo', d:'retiradas de R$ '+f(ret)+' com resultado de −R$ '+f(Math.abs(res))+' — insustentável a médio prazo.'});
  }
  // PMR alto
  var pmrp = pmrPmpDoPeriodo(ano);
  if(pmrp && pmrp.pmr_efetivo !== null && pmrp.pmp_efetivo !== null){
    if(pmrp.pmr_efetivo > pmrp.pmp_efetivo + 5){
      alertas.push({t:'wa', b:'Ciclo financeiro negativo', d:'recebe em '+pmrp.pmr_efetivo+'d e paga em '+pmrp.pmp_efetivo+'d — pressiona capital de giro.'});
    }
  }
  // Produtos com margem baixa
  var produtos = getTopProdAno(ano);
  var baixaM = produtos.filter(function(p){return p.fat>0 && p.margem_pct<15;}).length;
  if(baixaM >= 10){
    alertas.push({t:'wa', b:baixaM+' produtos com margem abaixo de 15%', d:'revisar mix — produtos com margem baixa puxam a média para baixo.'});
  }
  // Clientes perdidos
  var coorte = getCoorteAno(ano);
  if(coorte && coorte.perdidos > coorte.novos + coorte.retornados){
    alertas.push({t:'wa', b:'Churn de clientes: '+coorte.perdidos+' perdidos vs '+(coorte.novos+coorte.retornados)+' novos/retornados', d:'base de clientes está encolhendo — investigar causas.'});
  }

  if(alertas.length===0){
    alertas.push({t:'ok', b:'Sem alertas críticos detectados', d:'todos os indicadores dentro do esperado no período analisado.'});
  }

  var out = '<div class="sc">ALERTAS ESTRATÉGICOS</div>';
  out += '<div class="card">';
  alertas.forEach(function(a){
    out += '<div class="al '+a.t+'"><div><b>'+a.b+'</b><span class="ad">'+a.d+'</span></div></div>';
  });
  out += '</div>';
  return out;
}

// === INIT ===
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bigtex — Painel Semanal</title><meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#161b22;--card-h:#1c2333;--brd:#21262d;--txt:#e6edf3;--dim:#8b949e;--mut:#484f58;--grn:#3fb950;--grn-bg:rgba(63,185,80,.12);--red:#f85149;--red-bg:rgba(248,81,73,.12);--yel:#d29922;--yel-bg:rgba(210,153,34,.12);--blu:#58a6ff;--blu-bg:rgba(88,166,255,.12);--cya:#39d2c0;--pur:#bc8cff;--ora:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif;padding:14px;-webkit-font-smoothing:antialiased}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--blu),var(--cya));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:3px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.nav a{font-size:11px;font-weight:600;padding:6px 14px;border-radius:8px;background:transparent;color:var(--dim);text-decoration:none;transition:all .15s}
.nav a.on{background:var(--blu);color:#fff}.nav a:hover:not(.on){color:var(--txt)}
.dt{color:var(--dim);font-size:11px;font-weight:500;background:var(--card);padding:4px 10px;border-radius:14px;border:1px solid var(--brd)}
.prow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.tabs{display:flex;gap:3px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.tab{font-size:11px;font-weight:600;padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;transition:all .15s}
.tab.on{background:var(--blu);color:#fff}.tab:hover:not(.on){color:var(--txt)}
.wkpill{display:flex;gap:3px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.wk{font-size:10px;font-weight:600;padding:5px 10px;border-radius:7px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit}
.wk.on{background:var(--pur);color:#fff}.wk:hover:not(.on){color:var(--txt)}
.wkrange{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;padding:0 4px}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.srch-w{position:relative;flex:1;min-width:200px;max-width:340px}
.srch{width:100%;padding:8px 12px 8px 30px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--txt);font-size:12px;font-family:inherit;outline:none}.srch:focus{border-color:var(--blu)}
.srch-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;color:var(--dim)}
.clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.ft{font-size:10px;color:var(--dim);background:var(--card);border:1px solid var(--brd);padding:3px 9px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:15px 16px;position:relative;overflow:hidden;transition:all .15s}
.card.ck{cursor:pointer}.card.ck:hover{background:var(--card-h);transform:translateY(-1px)}
.card.fx{border-style:dashed}
.ac{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.lbfx{font-size:8px;font-weight:600;color:var(--mut);letter-spacing:.5px;text-transform:none;padding:1px 5px;border:1px solid var(--brd);border-radius:4px}
.vl{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.sb{font-size:11px;color:var(--dim);margin-top:3px;font-weight:500}
.bg{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:5px}
.sm{display:flex;gap:4px;margin-top:5px}.sd{width:8px;height:8px;border-radius:50%;opacity:.15}.sd.on{opacity:1}
.sg{background:var(--grn)}.sy{background:var(--yel)}.sr{background:var(--red)}
.sd.on.sg{box-shadow:0 0 6px var(--grn)}.sd.on.sy{box-shadow:0 0 6px var(--yel)}.sd.on.sr{box-shadow:0 0 6px var(--red)}
.dd{margin-top:8px;animation:si .2s ease;max-height:280px;overflow-y:auto}@keyframes si{from{opacity:0}to{opacity:1}}
.dr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--brd);font-size:11px;gap:6px}.dr:last-child{border-bottom:none}
.dr .n{color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.dr .v{font-family:'JetBrains Mono',monospace;font-weight:600;flex-shrink:0}
.sc{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px 4px;display:flex;align-items:center;gap:6px}
.sc::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--blu)}
.sc.fxsc::before{background:var(--mut)}.sc.fxsc{color:var(--mut)}
.sc.fxsc small{font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);font-size:10px;margin-left:6px}
.dc{background:rgba(248,81,73,.06);border-radius:6px;padding:8px 10px;margin-bottom:4px;border-left:3px solid var(--red)}
.dcn{font-size:11px;font-weight:700;margin-bottom:2px}.dcd{display:flex;gap:10px;font-size:10px;flex-wrap:wrap}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);font-size:11px}.fr:last-child{border-bottom:none}
.prog{margin-bottom:7px}.prh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.prv{font-family:'JetBrains Mono',monospace;font-weight:600}
.prb{background:var(--brd);border-radius:3px;height:5px;overflow:hidden}.prf{height:100%;border-radius:3px}
.al{display:flex;gap:9px;padding:9px 11px;border-radius:6px;margin-bottom:5px;font-size:11px;line-height:1.3}
.al.ok{background:var(--grn-bg);border-left:3px solid var(--grn)}.al.cr{background:var(--red-bg);border-left:3px solid var(--red)}.al.wa{background:var(--yel-bg);border-left:3px solid var(--yel)}
.al b{display:block;margin-bottom:1px}.al .ad{color:var(--dim)}
.ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.ic{text-align:center}.iv{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700}.iu{font-size:12px;color:var(--dim)}
.ftr{text-align:center;color:var(--mut);font-size:9px;padding:14px 0 6px;letter-spacing:.4px}
.agb{display:flex;height:20px;border-radius:4px;overflow:hidden;margin-top:6px;font-size:8px;font-weight:600}
.agb div{display:flex;align-items:center;justify-content:center;color:#fff;min-width:15px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.nada{text-align:center;color:var(--dim);font-size:11px;padding:20px;font-style:italic}
.sep{border:none;border-top:1px dashed var(--brd);margin:18px 0 0}

/* FLUXO DE CAIXA — NOVO LAYOUT COMPACTO HORIZONTAL */
.fcwrap{padding:6px 10px 10px}
.fcsvg{width:100%;height:280px;display:block;max-width:100%}
.fcsaldo{width:100%;height:auto;display:block;max-width:100%;margin-top:6px}
.fcsplit{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fcsplit > div{position:relative}
.fctitle{text-align:center;font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 0 0}

.fcleg{display:flex;gap:14px;justify-content:center;margin-top:6px;font-size:10px;color:var(--dim);flex-wrap:wrap}
.fcleg span.sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}

/* GRÁFICO ROSCA SALDO */
.donut-wrap{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.donut-legend{display:flex;flex-direction:column;gap:5px;font-size:11px}
.donut-legend div{display:flex;align-items:center;gap:6px}
.donut-sw{width:10px;height:10px;border-radius:2px}
.donut-legend .bkn{color:var(--dim);font-weight:600;min-width:48px}
.donut-legend .bkv{font-family:'JetBrains Mono',monospace;font-weight:700}
.donut-legend .bkp{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:10px;min-width:34px;text-align:right}

@media(max-width:600px){.vl{font-size:20px}.hdr h1{font-size:17px}.fcsvg{height:220px}}
</style></head><body><div id="app"></div>
<script src="payload.js"></script>
<script>
var HOJE=new Date(D.hoje+'T00:00:00');
var S={view:'mes',week:null,busca:'',dd:null};

function f(v){return Math.round(v).toLocaleString('pt-BR');}
function sem(lv){return '<div class="sm">'+['sg','sy','sr'].map(function(l){return '<div class="sd '+l+(l==='s'+lv?' on':'')+'"></div>';}).join('')+'</div>';}
function toggle(id){S.dd=S.dd===id?null:id;render();}
function clearSearch(){S.busca='';render();}
function pDate(s){return new Date(s+'T00:00:00');}
function fmtDM(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function isoWeek(d){
  var target=new Date(d.valueOf());
  var dayNr=(d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  var firstThursday=target.valueOf();
  target.setMonth(0,1);
  if(target.getDay()!==4){target.setMonth(0,1+((4-target.getDay())+7)%7);}
  return 1+Math.ceil((firstThursday-target)/604800000);
}

function getPeriodo(){
  var y=HOJE.getFullYear(),m=HOJE.getMonth();
  if(S.view==='mes'){
    var ini=new Date(y,m,1);
    var fim=new Date(y,m+1,0);
    return {ini:ini,fim:fim,label:'Mensal ('+String(m+1).padStart(2,'0')+'/'+y+')'};
  }
  if(S.view==='sem'){
    var semanas=getWeeksOfMonth(y,m);
    var idx=S.week||0;
    if(idx>=semanas.length)idx=semanas.length-1;
    var w=semanas[idx];
    return {ini:w.ini,fim:w.fim,label:'S'+isoWeek(w.ini)+' ('+fmtDM(w.ini)+'-'+fmtDM(w.fim)+')'};
  }
  if(S.view==='prox'){
    var ini=new Date(HOJE);
    var fim=new Date(HOJE);fim.setDate(fim.getDate()+30);
    return {ini:ini,fim:fim,label:'Próx. 30 dias ('+fmtDM(ini)+'-'+fmtDM(fim)+')'};
  }
}

function getWeeksOfMonth(y,m){
  var semanas=[];
  var diaUm=new Date(y,m,1);
  var dow=diaUm.getDay();
  var offset=dow===0?6:dow-1;
  var cur=new Date(y,m,1-offset);
  while(true){
    var ini=new Date(cur);
    var fim=new Date(cur);fim.setDate(fim.getDate()+6);
    semanas.push({ini:ini,fim:fim});
    cur.setDate(cur.getDate()+7);
    var ultDia=new Date(y,m+1,0);
    if(cur > ultDia) break;
  }
  return semanas;
}

function filterByRange(items,ini,fim){
  var iniT=ini.getTime(),fimT=fim.getTime();
  return items.filter(function(x){
    var t=pDate(x.vc).getTime();
    return t>=iniT && t<=fimT;
  });
}

function filterBySearch(items,key){
  if(!S.busca)return items;
  var b=S.busca.toLowerCase();
  return items.filter(function(x){return (x[key]||'').toLowerCase().indexOf(b)>=0;});
}

function calcFluxo(){
  var fluxo=[];
  var saldo=D.saldo_total;
  var rec=D.rec_ab.filter(function(x){return pDate(x.vc)>=HOJE;});
  var pag=D.pag_ab.filter(function(x){return pDate(x.vc)>=HOJE;});
  var cur=new Date(HOJE);
  for(var i=0;i<8;i++){
    var ini=new Date(cur);
    var fim=new Date(cur);fim.setDate(fim.getDate()+7);
    var e=rec.filter(function(x){var t=pDate(x.vc);return t>=ini && t<fim;}).reduce(function(a,x){return a+x.v;},0);
    var sa=pag.filter(function(x){var t=pDate(x.vc);return t>=ini && t<fim;}).reduce(function(a,x){return a+x.v;},0);
    saldo+=(e-sa);
    fluxo.push({s:'S'+isoWeek(ini),pr:fmtDM(ini)+'-'+fmtDM(fim),e:e,sa:sa,saldo:saldo});
    cur=fim;
  }
  return fluxo;
}

// SVG FLUXO DE CAIXA — DUAS PARTES: BARRAS (esq) + LINHA DO SALDO (dir)
function renderFluxoBarsSVG(fluxo){
  var w=760,hSvg=260;
  var padL=42,padR=12,padT=22,padB=60;
  var innerW=w-padL-padR, innerH=hSvg-padT-padB;
  var n=fluxo.length;
  var barGroupW=innerW/n;
  var barW=barGroupW*0.34;

  var maxBar=Math.max.apply(null,fluxo.map(function(x){return Math.max(x.e,x.sa);}));if(!maxBar)maxBar=1;

  var svg='<svg class="fcsvg" viewBox="0 0 '+w+' '+hSvg+'" preserveAspectRatio="xMidYMid meet">';
  // Grid
  for(var g=0;g<=3;g++){
    var gy=padT+(innerH/3)*g;
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#21262d" stroke-dasharray="2,2"/>';
  }
  // Barras
  fluxo.forEach(function(fl,i){
    var cx=padL+barGroupW*(i+0.5);
    var hE=(fl.e/maxBar)*innerH;
    var hS=(fl.sa/maxBar)*innerH;
    var xE=cx-barW-1, xS=cx+1;
    var yE=padT+innerH-hE, yS=padT+innerH-hS;
    svg+='<rect x="'+xE+'" y="'+yE+'" width="'+barW+'" height="'+hE+'" fill="url(#grE)" rx="2"/>';
    svg+='<rect x="'+xS+'" y="'+yS+'" width="'+barW+'" height="'+hS+'" fill="url(#grS)" rx="2"/>';
    // Labels das semanas
    svg+='<text x="'+cx+'" y="'+(padT+innerH+15)+'" text-anchor="middle" fill="#e6edf3" font-family="Plus Jakarta Sans" font-weight="700" font-size="11">'+fl.s+'</text>';
    svg+='<text x="'+cx+'" y="'+(padT+innerH+28)+'" text-anchor="end" fill="#6e7681" font-family="JetBrains Mono" font-size="8" transform="rotate(-45 '+cx+' '+(padT+innerH+28)+')">'+fl.pr+'</text>';
    // Valores em cima das barras
    svg+='<text x="'+(xE+barW/2)+'" y="'+(yE-3)+'" text-anchor="middle" fill="#3fb950" font-family="JetBrains Mono" font-weight="700" font-size="8">'+(fl.e>=1000?(fl.e/1000).toFixed(0)+'k':f(fl.e))+'</text>';
    svg+='<text x="'+(xS+barW/2)+'" y="'+(yS-3)+'" text-anchor="middle" fill="#f85149" font-family="JetBrains Mono" font-weight="700" font-size="8">'+(fl.sa>=1000?(fl.sa/1000).toFixed(0)+'k':f(fl.sa))+'</text>';
  });
  // Eixo Y
  for(var g=0;g<=3;g++){
    var gy=padT+(innerH/3)*g;
    var v=maxBar*(1-g/3);
    svg+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#6e7681" font-family="JetBrains Mono" font-size="8">'+Math.round(v/1000)+'k</text>';
  }
  svg+='<defs>';
  svg+='<linearGradient id="grE" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3fb950"/><stop offset="100%" stop-color="#238636"/></linearGradient>';
  svg+='<linearGradient id="grS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f85149"/><stop offset="100%" stop-color="#da3633"/></linearGradient>';
  svg+='</defs></svg>';
  return svg;
}

function renderFluxoSaldoSVG(fluxo){
  var w=420,hSvg=210;
  var padL=38,padR=15,padT=22,padB=58;
  var innerW=w-padL-padR, innerH=hSvg-padT-padB;
  var n=fluxo.length;
  var colW=innerW/n;

  var saldos=fluxo.map(function(x){return x.saldo;});
  var minS=Math.min.apply(null,saldos);
  var maxS=Math.max.apply(null,saldos);
  // Dar margem para não colar nas bordas
  var margin=(maxS-minS)*0.12;if(margin===0)margin=maxS*0.1||1;
  var yMin=minS-margin, yMax=maxS+margin;
  var range=yMax-yMin;if(range===0)range=1;

  function yOf(v){return padT+innerH-((v-yMin)/range)*innerH;}

  var svg='<svg class="fcsaldo" viewBox="0 0 '+w+' '+hSvg+'" preserveAspectRatio="xMidYMid meet">';

  // Grid e labels do eixo Y (4 linhas)
  for(var g=0;g<=3;g++){
    var gy=padT+(innerH/3)*g;
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#21262d" stroke-dasharray="2,2"/>';
    var v=yMax-(range/3)*g;
    svg+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#6e7681" font-family="JetBrains Mono" font-size="8">'+Math.round(v/1000)+'k</text>';
  }

  // Zero line (se zero cruzar o gráfico)
  if(yMin<0 && yMax>0){
    var y0=yOf(0);
    svg+='<line x1="'+padL+'" y1="'+y0+'" x2="'+(w-padR)+'" y2="'+y0+'" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>';
    svg+='<text x="'+(w-padR-2)+'" y="'+(y0-3)+'" text-anchor="end" fill="#f85149" font-family="JetBrains Mono" font-size="7" font-weight="700">0</text>';
  }

  // Pontos da linha
  var pts=fluxo.map(function(fl,i){
    var cx=padL+colW*(i+0.5);
    return {x:cx,y:yOf(fl.saldo),v:fl.saldo,s:fl.s,pr:fl.pr};
  });

  // Área sob a linha (só parte positiva) — gradient
  var areaPath='M '+pts[0].x+','+yOf(Math.max(yMin,0))+' L '+pts.map(function(p){return p.x+','+p.y;}).join(' L ')+' L '+pts[pts.length-1].x+','+yOf(Math.max(yMin,0))+' Z';
  svg+='<path d="'+areaPath+'" fill="url(#grArea)" opacity="0.35"/>';

  // Linha principal
  var line='M '+pts.map(function(p){return p.x+','+p.y;}).join(' L ');
  svg+='<path d="'+line+'" fill="none" stroke="#58a6ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>';

  // Pontos + labels
  pts.forEach(function(p,i){
    var cor=p.v>0?'#58a6ff':'#f85149';
    svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#0d1117" stroke="'+cor+'" stroke-width="2.2"/>';
    // Label — alternar posição (acima/abaixo) se ponto anterior estiver perto verticalmente
    var offset=-10;
    if(i>0 && Math.abs(p.y-pts[i-1].y)<14) offset=14;
    var vlbl=Math.abs(p.v)>=1000?(p.v/1000).toFixed(0)+'K':f(p.v);
    svg+='<text x="'+p.x+'" y="'+(p.y+offset)+'" text-anchor="middle" fill="'+cor+'" font-family="JetBrains Mono" font-weight="700" font-size="10">'+vlbl+'</text>';
    // Label da semana no eixo X
    svg+='<text x="'+p.x+'" y="'+(padT+innerH+14)+'" text-anchor="middle" fill="#e6edf3" font-family="Plus Jakarta Sans" font-weight="700" font-size="10">'+p.s+'</text>';
    svg+='<text x="'+p.x+'" y="'+(padT+innerH+25)+'" text-anchor="end" fill="#6e7681" font-family="JetBrains Mono" font-size="7" transform="rotate(-45 '+p.x+' '+(padT+innerH+25)+')">'+p.pr+'</text>';
  });

  svg+='<defs>';
  svg+='<linearGradient id="grArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#58a6ff" stop-opacity="0.7"/><stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/></linearGradient>';
  svg+='</defs></svg>';
  return svg;
}

// SVG DONUT SALDO
function renderDonutSaldo(){
  var bancos=Object.keys(D.saldos);
  var total=D.saldo_total;
  var cores={Itaú:'#f0883e',Inter:'#e5488d',Stone:'#3fb950',Caixa:'#1e90ff'};
  var size=130, stroke=28, r=(size-stroke)/2, cx=size/2, cy=size/2;
  var circ=2*Math.PI*r;
  var acc=0;
  var paths='';
  var legend='';
  bancos.forEach(function(b){
    var val=D.saldos[b];
    var pct=val/total;
    var dash=pct*circ;
    var cor=cores[b]||'#8b949e';
    // rotate para começar em cima (-90)
    var rot=-90+ (acc/circ)*360;
    paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+cor+'" stroke-width="'+stroke+'" stroke-dasharray="'+dash+' '+(circ-dash)+'" transform="rotate('+rot+' '+cx+' '+cy+')" style="transition:all .2s"/>';
    acc+=dash;
    legend+='<div><div class="donut-sw" style="background:'+cor+'"></div><span class="bkn">'+b+'</span><span class="bkv">'+f(val)+'</span><span class="bkp">'+(pct*100).toFixed(1)+'%</span></div>';
  });
  var svg='<svg viewBox="0 0 '+size+' '+size+'" width="130" height="130">'+paths;
  svg+='<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" fill="#8b949e" font-family="Plus Jakarta Sans" font-size="9" font-weight="600">Total</text>';
  svg+='<text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" fill="#e6edf3" font-family="JetBrains Mono" font-weight="700" font-size="13">'+f(total)+'</text>';
  svg+='</svg>';
  return '<div class="donut-wrap">'+svg+'<div class="donut-legend">'+legend+'</div></div>';
}

      top3Inad.forEach(function(x,i){inadDet+=(i>0?' • ':'')+x.c.trim()+' <b style="color:var(--red)">R$ '+f(x.v)+'</b>';});
    }
    if(aging['>365d']>0)inadDet+=' • R$ '+f(aging['>365d'])+' com +1 ano (cobrança jurídica).';
    h+='<div class="al cr"><span style="font-size:14px">🔴</span><div><b>Inadimplência '+(isProx?'total':'no período')+': R$ '+f(tInad)+' ('+nInad+' títulos)</b><span class="ad">'+inadDet+'</span></div></div>';
  }

  // ALERTA 3: Devedores comprando com top 3
  if(dcLen>0){
    var devDet='';
    if(top3Dev.length>0){
      devDet='Top 3 por exposição: ';
      top3Dev.forEach(function(x,i){devDet+=(i>0?' • ':'')+x.c.trim()+' <b style="color:var(--red)">R$ '+f(x.div+x.nov)+'</b>';});
    }
    devDet+=' • Exposição total R$ '+f(dcExp)+'. Bloquear crédito.';
    h+='<div class="al cr"><span style="font-size:14px">🔴</span><div><b>'+dcLen+' clientes devendo e comprando</b><span class="ad">'+devDet+'</span></div></div>';
  }

  // ALERTA 4: Pagar vencidas com top 3
  if(tPagVenc>0){
    var pagDet='';
    if(top3PagVenc.length>0){
      pagDet='Top 3: ';
      top3PagVenc.forEach(function(x,i){pagDet+=(i>0?' • ':'')+x.f.trim()+' <b style="color:var(--yel)">R$ '+f(x.v)+'</b>';});
    }
    pagDet+=' • '+pagVencPS.length+' títulos no total. Regularizar para evitar juros.';
    h+='<div class="al wa"><span style="font-size:14px">🟡</span><div><b>R$ '+f(tPagVenc)+' em contas a pagar vencidas no período</b><span class="ad">'+pagDet+'</span></div></div>';
  }

  h+='</div>';

  h+='<div class="ftr">BIGTEX • Painel Semanal • Dados validados contra ERP • '+D.data_ref+' • Clique nos cards para expandir</div>';

  document.getElementById('app').innerHTML=h;
  var el=document.getElementById('bsc');
  if(el){el.addEventListener('input',function(){S.busca=this.value;var p=this.selectionStart;render();var n=document.getElementById('bsc');if(n){n.focus();n.setSelectionRange(p,p);}});}
}

function setView(v){
  S.view=v;
  S.dd=null;
  if(v==='sem' && S.week===null){
    var y=HOJE.getFullYear(),m=HOJE.getMonth();
    var semanas=getWeeksOfMonth(y,m);
    var hojeT=HOJE.getTime();
    for(var i=0;i<semanas.length;i++){
      if(hojeT>=semanas[i].ini.getTime() && hojeT<=semanas[i].fim.getTime()+86400000){
        S.week=i;break;
      }
    }
    if(S.week===null)S.week=0;
  }
  render();
}
function setWeek(i){S.week=i;S.dd=null;render();}

render();
</script></body></html>

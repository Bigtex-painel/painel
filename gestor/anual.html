<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bigtex — Painel Anual</title><meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#161b22;--card-h:#1c2333;--brd:#21262d;--txt:#e6edf3;--dim:#a8b2be;--mut:#6b7582;--grn:#3fb950;--grn-bg:rgba(63,185,80,.12);--red:#f85149;--red-bg:rgba(248,81,73,.12);--yel:#d29922;--yel-bg:rgba(210,153,34,.12);--blu:#58a6ff;--blu-bg:rgba(88,166,255,.12);--cya:#39d2c0;--pur:#bc8cff;--ora:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif;padding:14px;-webkit-font-smoothing:antialiased}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--blu),var(--cya));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:3px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.nav a{font-size:11px;font-weight:600;padding:6px 14px;border-radius:8px;background:transparent;color:var(--dim);text-decoration:none;transition:all .15s}
.nav a.on{background:var(--blu);color:#fff}.nav a:hover:not(.on){color:var(--txt)}
.dt{color:var(--dim);font-size:11px;font-weight:500;background:var(--card);padding:4px 10px;border-radius:14px;border:1px solid var(--brd)}
.prow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px;position:sticky;top:0;z-index:50;background:var(--bg);padding:10px 0;margin-top:0;border-bottom:1px solid var(--brd)}
.chips{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.chip{font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;background:transparent;color:var(--dim);cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chip.on{background:var(--blu);color:#fff}
.chip.parc{background:var(--yel);color:#000}
.chip:hover:not(.on):not(.parc){color:var(--txt)}
.sel-wrap{display:flex;align-items:center;gap:6px}
.tgl-wrap{display:flex;gap:3px;background:var(--card);border-radius:8px;padding:2px;border:1px solid var(--brd)}
.tgl-btn{font-size:11px;font-weight:600;padding:5px 11px;border-radius:6px;background:transparent;color:var(--dim);cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.tgl-btn.on{background:var(--blu);color:#fff}
.tgl-btn.on-grn{background:var(--grn);color:#000}
.tgl-btn.on-red{background:var(--red);color:#fff}
.tgl-btn:hover:not(.on):not(.on-grn):not(.on-red){color:var(--txt)}
.ft{font-size:10px;color:var(--dim);background:var(--card);border:1px solid var(--brd);padding:3px 9px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.ft.warn{color:var(--yel);border-color:var(--yel)}
.kpigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;margin-bottom:14px}
.kcard{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:all .15s}
.kcard.ck{cursor:pointer}
.kcard.ck:hover{background:var(--card-h);transform:translateY(-1px)}
.kcard .dd{margin-top:10px;padding-top:10px;border-top:1px solid var(--brd);animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.kdd-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:10.5px;gap:8px}
.kdd-row .kdd-lbl{color:var(--dim);font-weight:500}
.kdd-row .kdd-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--txt)}
.kdd-hdr{font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;margin-top:6px}
.kdd-hdr:first-child{margin-top:0}
.kexp{font-size:10px;color:var(--dim);margin-left:auto;opacity:.6}
.kcard.ck:hover .kexp{opacity:1}
.kac{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.klb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:4px}
.kvl{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.ksub{font-size:10px;color:var(--mut);margin-top:2px;font-family:'JetBrains Mono',monospace}
.kcomp{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:10px}
.kcomp span{font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.03)}
.up{color:var(--grn)}.dn{color:var(--red)}.neu{color:var(--dim)}
.sc{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px 4px;display:flex;align-items:center;gap:6px}
.sc::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--blu)}
.sc.fxsc::before{background:var(--mut)}.sc.fxsc{color:var(--mut)}
.sc.fxsc small{font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);font-size:10px;margin-left:6px}
.sc-tail{margin-left:auto;display:flex;gap:6px;align-items:center}
.card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:15px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.tblwrap{overflow-x:auto}
.dre{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.dre td,.dre th{padding:7px 10px;text-align:right;border-bottom:1px solid var(--brd)}
.dre th{text-align:center;font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dre td.l{text-align:left;font-weight:500}
.dre td.vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.dre td.pct{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:11px}
.dre tr.sec td{padding-top:10px;font-weight:700;border-bottom:2px solid var(--brd)}
.dre tr.sub td.l{padding-left:22px;color:var(--dim);font-weight:400;font-size:11px}
.dre tr.totgreen td.vl{color:var(--grn)}
.dre tr.totred td.vl{color:var(--red)}
.dre tr.totblue td.vl{color:var(--blu)}
.dre tr.totpur td.vl{color:var(--pur)}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);font-size:12px;gap:8px}.fr:last-child{border-bottom:none}
.fr .lft{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr .rgt{display:flex;gap:10px;align-items:center;flex-shrink:0}
.fr .vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.fr .delta{font-size:9px;font-family:'JetBrains Mono',monospace;min-width:44px;text-align:right}
.tbl-head{display:flex;justify-content:space-between;align-items:center;padding:4px 0 6px;border-bottom:1px solid var(--brd);font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;gap:8px;margin-bottom:4px}
.tbl-head .lft{flex:1;min-width:0}
.tbl-head .rgt{display:flex;gap:10px;align-items:center;flex-shrink:0}
.tbl-head .col-lbl{font-family:'Plus Jakarta Sans',sans-serif}
.prog{margin-bottom:8px}.prh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;gap:6px;align-items:center}
.prh .cat{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prv{font-family:'JetBrains Mono',monospace;font-weight:600}
.prog-head{display:flex;justify-content:space-between;padding:4px 0 6px;border-bottom:1px solid var(--brd);font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.prb{background:var(--brd);border-radius:3px;height:5px;overflow:hidden;position:relative}
.prf{height:100%;border-radius:3px;transition:width .3s}
.prdelta{font-size:9px;font-family:'JetBrains Mono',monospace;margin-left:6px}
.al{display:flex;gap:9px;padding:9px 11px;border-radius:6px;margin-bottom:5px;font-size:11px;line-height:1.35}
.al.ok{background:var(--grn-bg);border-left:3px solid var(--grn)}
.al.cr{background:var(--red-bg);border-left:3px solid var(--red)}
.al.wa{background:var(--yel-bg);border-left:3px solid var(--yel)}
.al b{display:block;margin-bottom:1px}.al .ad{color:var(--dim)}
.ftr{text-align:center;color:var(--mut);font-size:9px;padding:14px 0 6px;letter-spacing:.4px}
.meta-line{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--dim);flex-wrap:wrap;margin-top:6px}
.meta-line input{width:100px;padding:3px 7px;border-radius:5px;border:1px solid var(--brd);background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;outline:none}
.meta-line input:focus{border-color:var(--blu)}
.metabar{background:var(--brd);border-radius:3px;height:6px;overflow:hidden;position:relative;flex:1;min-width:80px;max-width:140px}
.metafill{height:100%;border-radius:3px}
.gauge{display:flex;align-items:center;gap:8px;margin-top:4px}
.gaugeval{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.search-box{background:var(--bg);border:1px solid var(--brd);color:var(--txt);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;outline:none;width:220px;max-width:100%}
.search-box:focus{border-color:var(--blu)}
.search-wrap{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.search-wrap .klb{margin-bottom:0;flex:0 0 auto}
.search-count{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace}
@media(max-width:600px){.kvl{font-size:18px}.hdr h1{font-size:17px}.search-box{width:100%}}
/* BARCHART (mensal do ano) */
.barchart{display:flex;align-items:flex-end;gap:5px;height:260px;padding-top:26px;border-bottom:1px solid var(--brd);padding-bottom:4px;position:relative}
.barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:0;position:relative;height:100%}
.barchart .col:hover .bar{filter:brightness(1.25)}
.barchart .col:hover .barval{color:var(--blu);font-weight:700;opacity:1}
.barchart .bar{width:82%;border-radius:2px 2px 0 0;background:linear-gradient(180deg,var(--blu),#1a5399);min-height:2px;position:relative;transition:all .15s;flex-shrink:0}
.barchart .bar.hi{background:linear-gradient(180deg,var(--grn),#238636)}
.barchart .bar.parc{background:linear-gradient(180deg,var(--yel),#9c6d0c);opacity:.9}
.barchart .barval{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--dim);white-space:nowrap;transition:all .15s}
.barchart .lbl{font-size:10px;color:var(--dim);margin-top:4px;font-weight:600;flex-shrink:0}
/* Comparativo ano a ano — 5 barras */
.yybars{display:flex;align-items:flex-end;gap:8px;height:220px;padding-top:26px;border-bottom:1px solid var(--brd);padding-bottom:4px;position:relative}
.yybars .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:0;position:relative;height:100%}
.yybars .col .bar-wrap{width:70%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex-shrink:0}
.yybars .bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;position:relative;transition:all .15s;flex-shrink:0}
.yybars .bar.cur{background:linear-gradient(180deg,var(--blu),#1a5399)}
.yybars .bar.ok{background:linear-gradient(180deg,var(--grn),#238636)}
.yybars .bar.bad{background:linear-gradient(180deg,var(--red),#a5352e)}
.yybars .bar.parc{background:linear-gradient(180deg,var(--yel),#9c6d0c);opacity:.9}
.yybars .col:hover .bar{filter:brightness(1.25)}
.yybars .barval{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--dim);white-space:nowrap}
.yybars .lbl{font-size:11px;color:var(--dim);margin-top:4px;font-weight:700;flex-shrink:0}
.yybars .lbl.cur{color:var(--blu)}
/* Variante com eixo zero no meio (para gráficos com valores negativos) */
.yybars-neg{padding-top:26px;padding-bottom:22px;position:relative}
.yybars-neg::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--brd);z-index:0;pointer-events:none}
.yybars-neg .col.neg{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex:1;min-width:0}
.yybars-neg .col.neg .half{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;min-height:0}
.yybars-neg .col.neg .half.top{justify-content:flex-end}
.yybars-neg .col.neg .half.bot{justify-content:flex-start}
.yybars-neg .col.neg .bar-wrap{width:70%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.yybars-neg .col.neg .bar-wrap.down{justify-content:flex-start}
.yybars-neg .col.neg .bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:all .15s;flex-shrink:0}
.yybars-neg .col.neg .bar.down{border-radius:0 0 3px 3px}
.yybars-neg .col.neg .barval{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--dim);white-space:nowrap}
.yybars-neg .col.neg .barval.below{top:auto;bottom:-16px;color:var(--red)}
.yybars-neg .col.neg:hover .bar{filter:brightness(1.25)}
.yybars-neg .col.neg .lbl{font-size:11px;color:var(--dim);margin-top:4px;font-weight:700;flex-shrink:0;position:absolute;bottom:-18px;left:0;right:0;text-align:center}
.yybars-neg .col.neg .lbl.cur{color:var(--blu)}
/* Heatmap sazonalidade */
.heatmap{display:grid;grid-template-columns:60px repeat(12,1fr);gap:3px;margin-top:8px}
.heatmap .hcell{padding:7px 4px;text-align:center;font-size:10px;font-family:'JetBrains Mono',monospace;border-radius:4px;color:var(--txt);font-weight:600;min-height:26px;display:flex;align-items:center;justify-content:center;cursor:default}
.heatmap .hcell.hd{background:transparent;color:var(--dim);font-weight:700;font-size:10px;text-transform:uppercase}
.heatmap .hcell.lbl{background:transparent;color:var(--dim);text-align:left;padding-left:0;font-weight:700;justify-content:flex-start}
.heatmap .hcell:hover:not(.hd):not(.lbl){filter:brightness(1.2);outline:1px solid var(--blu)}
/* Linhas sobrepostas sazonalidade — largura 100% com altura proporcional (8:3) */
.linesbox{position:relative;margin-top:8px;padding:10px 4px 0;width:100%}
.linesbox svg{width:100%;height:auto;display:block;overflow:visible;aspect-ratio:800/300}
/* Tooltip concentração (aparece ao passar o mouse sobre os dots) */
#contip{position:fixed;z-index:9999;pointer-events:none;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:8px 10px;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,0.45);min-width:180px;display:none}
#contip .th{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
#contip .row{display:flex;justify-content:space-between;gap:10px;padding:2px 0}
#contip .row .n{color:var(--txt);font-weight:600}
#contip .row .v{color:var(--cya);font-family:'JetBrains Mono',monospace;font-weight:700}
.con-dot:hover, .inad-dot:hover{filter:brightness(1.3)}
.lineslegend{display:flex;gap:12px;justify-content:center;font-size:11px;color:var(--dim);margin-top:4px;flex-wrap:wrap}
.lineslegend span{display:flex;gap:5px;align-items:center;font-weight:600}
.lineslegend i{display:inline-block;width:14px;height:3px;border-radius:2px}
/* Ranking retiradas sócios */
.socbox{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.socbox{grid-template-columns:1fr}}
.socyr{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px}
.socyr.hi{border-color:var(--blu);background:var(--card-h)}
.socyrh{display:flex;justify-content:space-between;margin-bottom:7px;align-items:baseline}
.socyrh .yr{font-size:13px;font-weight:700}
.socyrh .tot{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px}
.socrow{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;align-items:center;gap:6px}
.socrow .nm{color:var(--dim)}
.socrow .vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.sobra-bar{display:flex;height:18px;border-radius:3px;overflow:hidden;margin-top:8px;background:var(--brd)}
.sobra-bar div{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#000;white-space:nowrap;overflow:hidden}
</style>
</head>
<body>
<div id="app"></div>
<script src="payload.js"></script>
<script>

// --- estado ---
var S = {
  ano: 2026,
  modo: 'ytd',    // 'full' | 'ytd' — derivado de S.periodo para retrocompat
  periodo: 'ano', // 'ano' | 'q1' | 'q2' | 'q3' | 'q4'
  dd: null,
  topCli: 'melhores',  // 'melhores' | 'piores'
  topProd: 'melhores',
  ordCli: 'fat',       // 'fat' | 'margem' | 'margem_pct'
  ordProd: 'fat',
  busca_cli: '',
  busca_prod: '',
  vizSazo: 'heatmap',  // 'heatmap' | 'linhas'
  metas: {}            // { receita_anual, margem_bruta_pct, margem_liquida_pct }
};
try{
  var saved = localStorage.getItem('bigtex_metas_anual');
  if(saved) S.metas = JSON.parse(saved);
}catch(e){}

// --- helpers ---
function f(v){if(v===null||v===undefined||isNaN(v))return '0';v=Math.round(v);return v.toLocaleString('pt-BR');}
function f2(v){if(v===null||v===undefined||isNaN(v))return '0,00';return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fk(v){if(v===null||v===undefined)return '0';if(Math.abs(v)>=1e6)return (v/1e6).toFixed(2).replace('.',',')+'M';if(Math.abs(v)>=1e3)return (v/1e3).toFixed(1).replace('.',',')+'k';return String(Math.round(v));}

// delta padrão (subir = verde)
function deltaHTML(atual, comp, invertida){
  if(comp===null||comp===undefined||comp===0||isNaN(comp))return '<span class="neu">—</span>';
  var d=(atual-comp)/Math.abs(comp)*100;
  var cls;
  if(invertida){cls=d<0?'up':(d>0?'dn':'neu');}
  else{cls=d>0?'up':(d<0?'dn':'neu');}
  var seta=d>0?'▲':(d<0?'▼':'•');
  return '<span class="'+cls+'">'+seta+' '+(d>0?'+':'')+f2(d)+'%</span>';
}
function deltaPP(atual, comp, invertida){
  if(comp===null||comp===undefined||isNaN(comp))return '<span class="neu">—</span>';
  var d=atual-comp;
  var cls;
  if(invertida){cls=d<0?'up':(d>0?'dn':'neu');}
  else{cls=d>0?'up':(d<0?'dn':'neu');}
  var seta=d>0?'▲':(d<0?'▼':'•');
  return '<span class="'+cls+'">'+seta+' '+(d>0?'+':'')+f2(d)+'pp</span>';
}

// --- acessores sensíveis ao período (S.periodo: 'ano' | 'q1'..'q4') ---
function getDataAno(ano){
  var k = String(ano);
  if(S.periodo && S.periodo !== 'ano'){
    if(D.ano_tri && D.ano_tri[k] && D.ano_tri[k][S.periodo]) return D.ano_tri[k][S.periodo];
    // fallback: trimestre sem dados → zeros
    return {receita:0,cmv:0,lucro_bruto:0,margem_bruta:0,impostos:0,desp_pessoal:0,desp_fixas:0,desp_var_vendas:0,desp_var_op:0,desp_operacional:0,financeiras:0,investimentos:0,resultado:0,margem_liquida:0,pedidos:0,qtde:0,clientes_unicos:0,ticket_medio:0,pro_labore:0,comissao_socio:0,retiradas_socios:0};
  }
  if(S.modo === 'ytd' || ano === 2026){
    return D.ano_ytd[k];
  }
  return D.ano_full[k];
}
function getCoorteAno(ano){
  var k = String(ano);
  if(S.periodo && S.periodo !== 'ano'){

function setAno(a){
  S.ano = a;
  if(a===2026) S.modo = 'ytd';

  if(S.periodo && S.periodo !== 'ano'){
    var q = parseInt(S.periodo.substring(1),10);
    if(!triDisponivel(a, q)) S.periodo = 'ano';
  }
  S.dd=null; S.busca_cli=''; S.busca_prod='';

}

function setPeriodo(p){
  // p = 'ano' | 'q1' | 'q2' | 'q3' | 'q4'
  if(p !== 'ano'){
    var q = parseInt(p.substring(1),10);
    if(!triDisponivel(S.ano, q)) return; // silenciosamente ignora se indisponível
  }
  S.periodo = p;
  // sincroniza S.modo para retrocompat de seções que ainda olham S.modo
  if(p === 'ano'){
    S.modo = (S.ano === 2026) ? 'ytd' : 'full';
  }
  S.dd = null;

}

  if(!query)return true;
  var t=(texto||'').toString().toLowerCase();
  var q=query.toLowerCase().trim();

  return t.indexOf(q)>=0;
}

  var pos = (id==='bcli') ? S._curCli : S._curProd;
  if(pos===undefined || pos===null) pos = (el.value||'').length;

  // Calcular Top 5 dos anos anteriores (para comparativo — mesmo período se trimestral)

  function linhaDRE(label, valor, valorAnt, isSec, isSub, isTot, corTot, invertida){
    var classes=[];
    if(isSec)classes.push('sec');
    if(isSub)classes.push('sub');
    if(isTot){classes.push('tot'+(corTot||'green'));}
    var cls=classes.length?' class="'+classes.join(' ')+'"':'';

    var row='<tr'+cls+'>';
    row+='<td class="l">'+label+'</td>';

      row+='<td class="pct">';
      if(valorAnt!==0 && !isNaN(valorAnt)){
        var invert=invertida||false;
        var d_;
        if(invert){
          // Linhas de despesa: interpretar pelo valor absoluto (se a despesa caiu, é positivo gerencialmente)
          d_=(Math.abs(valor)-Math.abs(valorAnt))/Math.abs(valorAnt)*100;
          var corDelta=d_<0?'var(--grn)':(d_>0?'var(--red)':'var(--dim)');
          var setaDelta=d_>0?'▲':(d_<0?'▼':'•');
          row+='<span style="color:'+corDelta+'">'+setaDelta+(d_>0?'+':'')+f2(d_)+'%</span>';
        }else{
          // Receitas e lucros: d>0 = bom (verde ▲); d<0 = ruim (vermelho ▼)
          d_=(valor-valorAnt)/Math.abs(valorAnt)*100;
          var corDelta2=d_>0?'var(--grn)':(d_<0?'var(--red)':'var(--dim)');
          var setaDelta2=d_>0?'▲':(d_<0?'▼':'•');
          row+='<span style="color:'+corDelta2+'">'+setaDelta2+(d_>0?'+':'')+f2(d_)+'%</span>';
        }
      }else{row+='—';}
      row+='</td>';
    }
    row+='</tr>';
    return row;
  }

  // EBITDA ajustado: receita - cmv - impostos - desp_op (honesto até o resultado, incluindo todos os componentes do resultado do anual menos fin e inv)
  var ebitda = d.receita - d.cmv - d.impostos - d.desp_operacional;
  var ebitdaAnt = dAnt ? (dAnt.receita - dAnt.cmv - dAnt.impostos - dAnt.desp_operacional) : 0;
  var recLiq = d.receita - d.impostos;
  var recLiqAnt = dAnt ? (dAnt.receita - dAnt.impostos) : 0;

  h+='</div>';

  // ============ DESPESAS POR CATEGORIA ============
  h+=renderDespesas();

  // salvar scroll e elemento ativo antes de trocar o DOM
  var _savedScroll = window.scrollY || window.pageYOffset || 0;
  var _activeEl = document.activeElement;
  var _activeId = (_activeEl && _activeEl.id) ? _activeEl.id : null;

  document.getElementById('app').innerHTML = h;

}


// ========== TOOLTIP DOS DOTS (CONCENTRAÇÃO + INADIMPLÊNCIA) ==========
function hookConTooltip(){
  // cria elemento uma vez e reusa
  var tip = document.getElementById('contip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'contip';
    document.body.appendChild(tip);
  }
  function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&/g,'&amp;');}
  function fmtBR(n){
    if(n===null||n===undefined||isNaN(n)) return '0';
    return Math.round(n).toLocaleString('pt-BR');
  }
  function show(ev){ tip.style.display='block'; posicionar(ev); }
  function hide(){ tip.style.display='none'; }
  function posicionar(ev){
    var pad = 14;
    var x = ev.clientX + pad;
    var y = ev.clientY + pad;
    var rect = tip.getBoundingClientRect();
    if(x + rect.width + 8 > window.innerWidth)  x = ev.clientX - rect.width - pad;
    if(y + rect.height + 8 > window.innerHeight) y = ev.clientY - rect.height - pad;
    tip.style.left = x+'px';
    tip.style.top = y+'px';
  }

  // ---- dots da Concentração ----
  document.querySelectorAll('.con-dot').forEach(function(el){
    el.addEventListener('mouseenter', function(ev){
      var ano = el.getAttribute('data-ano');
      var raw = el.getAttribute('data-top5') || '';
      if(!raw){ tip.style.display='none'; return; }
      var itens = raw.split(';;').map(function(pair){
        var sp = pair.split('|');
        return {n: sp[0], v: parseFloat(sp[1]||'0')};
      });
      var html = '<div class="th">Top 5 clientes · '+esc(ano)+'</div>';
      itens.forEach(function(x, i){
        html += '<div class="row"><span class="n">'+(i+1)+'. '+esc(x.n)+'</span><span class="v">R$ '+fmtBR(x.v)+'</span></div>';
      });
      tip.innerHTML = html;
      show(ev);
    });
    el.addEventListener('mousemove', posicionar);
    el.addEventListener('mouseleave', hide);
  });

  // ---- dots da Inadimplência ----
  document.querySelectorAll('.inad-dot').forEach(function(el){
    el.addEventListener('mouseenter', function(ev){
      var ano = el.getAttribute('data-ano');
      var raw = el.getAttribute('data-inad') || '';
      if(!raw){ tip.style.display='none'; return; }
      var sp = raw.split('|');
      var inad = parseFloat(sp[0]||'0');
      var total = parseFloat(sp[1]||'0');
      var html = '<div class="th">Inadimplência · '+esc(ano)+'</div>';
      html += '<div class="row"><span class="n">Em aberto</span><span class="v">R$ '+fmtBR(inad)+'</span></div>';
      html += '<div class="row"><span class="n">Faturado no ano</span><span class="v" style="color:var(--dim)">R$ '+fmtBR(total)+'</span></div>';
      tip.innerHTML = html;
      show(ev);
    });
    el.addEventListener('mousemove', posicionar);
    el.addEventListener('mouseleave', hide);
  });
}

// ========== EVOLUÇÃO MENSAL — SVG COM EIXO DUPLO ==========
function svgEvolMensal(meses, receitas, resultados, nomesMes, ano){
  // dimensões
  var W = 1200, H = 340;
  var mgT = 36, mgB = 64, mgL = 60, mgR = 60;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = meses.length;
  // escalas
  var maxRec = Math.max.apply(null, receitas.concat([1]));
  var maxRes = Math.max.apply(null, resultados.concat([0]));
  var minRes = Math.min.apply(null, resultados.concat([0]));
  // Escala 100% ajustada ao maior valor real (apenas ~5% de folga visual)
  // e ticks intermediários "redondos" que caem dentro dessa faixa.
  function niceTickStep(range, approxTicks){
    if(range<=0) return 1;
    var raw = range / approxTicks;
    var p = Math.pow(10, Math.floor(Math.log10(raw)));
    var n_ = raw/p;
    var step = n_<1.5?1:(n_<3?2:(n_<7?5:10));
    return step * p;
  }
  // topo: valor real do maior + 5% de folga para headroom visual
  var recMax = maxRec * 1.05;
  var resMax = maxRes>0 ? maxRes * 1.08 : 0;
  var resMin = minRes<0 ? minRes * 1.08 : 0;
  if(resMax===0 && resMin===0) resMax=1;
  // ticks do eixo esquerdo (receita) e direito (resultado)
  var stepRec = niceTickStep(recMax, 4);
  var recTicks = [];
  for(var tk=0; tk*stepRec <= recMax + stepRec*0.01; tk++){
    recTicks.push(tk*stepRec);
  }
  // topo exato do eixo esquerdo = último tick (ou o próprio recMax se ainda faltar)
  var recTop = recTicks[recTicks.length-1];
  if(recTop < recMax) { recTop += stepRec; recTicks.push(recTop); }
  // eixo direito: mesma cardinalidade de ticks, mantendo o alinhamento da linha base (0)
  var resRange = resMax - resMin;
  var stepRes = niceTickStep(resRange, recTicks.length-1);
  var resTicks = [];
  // ancorar ticks no 0 quando houver negativos
  var startTk = resMin<0 ? Math.floor(resMin/stepRes)*stepRes : 0;
  var endTk = Math.ceil(resMax/stepRes)*stepRes;
  for(var tv=startTk; tv<=endTk+stepRes*0.01; tv+=stepRes){
    resTicks.push(tv);
  }
  // usa os extremos dos ticks como limites reais dos eixos
  recTop = Math.max.apply(null, recTicks);
  var resTop = Math.max.apply(null, resTicks);
  var resBot = Math.min.apply(null, resTicks);
  // helpers geométricos — barras finas com gap generoso
  var bandW = plotW / n;
  var barGap = Math.max(10, bandW * 0.42);
  var barW = bandW - barGap;
  function xBand(i){ return mgL + i*bandW + bandW/2; }
  function yRec(v){ return mgT + plotH - (v/recTop)*plotH; }
  function yRes(v){
    return mgT + plotH - (v - resBot)/(resTop - resBot) * plotH;
  }
  // mês atual (parcial) em 2026
  var mesParc = (ano===2026 && D.ytd_mes) ? D.ytd_mes : -1;

  var s = '<div style="overflow-x:auto">';
  s += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;min-width:800px">';

  // ---- definições: gradiente das barras (contraste forte) ----
  s += '<defs>';
  s += '<linearGradient id="gradBar" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#9ecbff" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#3a7dd1" stop-opacity="0.95"/>';
  s += '<stop offset="100%" stop-color="#153d6e" stop-opacity="0.9"/>';
  s += '</linearGradient>';
  s += '<linearGradient id="gradBarParc" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#cfe3ff" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#4a8ee0" stop-opacity="1"/>';
  s += '<stop offset="100%" stop-color="#1e5299" stop-opacity="0.95"/>';
  s += '</linearGradient>';
  s += '</defs>';

  // ---- título dos eixos ----
  s += '<text x="'+mgL+'" y="18" fill="var(--blu)" font-size="11" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" letter-spacing="0.5">RECEITA (R$)</text>';
  s += '<text x="'+(W-mgR)+'" y="18" text-anchor="end" fill="var(--cya)" font-size="11" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" letter-spacing="0.5">RESULTADO (R$)</text>';

  // ---- grid horizontal tracejado + labels dos dois eixos ----
  recTicks.forEach(function(v, i){
    var y = yRec(v);
    s += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.55"/>';
    s += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+fk(v)+'</text>';
  });
  resTicks.forEach(function(v, i){
    var y = yRes(v);
    s += '<text x="'+(W-mgR+8)+'" y="'+(y+4)+'" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+fk(v)+'</text>';
  });

  // ---- barras de receita (com gradiente) ----
  meses.forEach(function(x, i){
    var v = receitas[i];
    if(v<=0) return;
    var bx = xBand(i) - barW/2;
    var by = yRec(v);
    var bh = mgT + plotH - by;
    var ehParc = (x.m === mesParc);
    var fill = ehParc ? 'url(#gradBarParc)' : 'url(#gradBar)';
    var strokeExtra = ehParc ? ' stroke="#7eb9ff" stroke-width="2"' : '';
    s += '<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="5" ry="5" fill="'+fill+'"'+strokeExtra+'/>';
  });

  // ---- linha zero do eixo direito (destacada quando há negativos) ----
  if(resBot < 0){
    var yZero = yRes(0);
    s += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yZero+'" y2="'+yZero+'" stroke="var(--mut)" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.85"/>';
    s += '<text x="'+(W-mgR+8)+'" y="'+(yZero-4)+'" fill="var(--mut)" font-size="9" font-weight="700" font-family="JetBrains Mono,monospace">0</text>';
  }

  // ---- linha do resultado (sobreposta) — segmentos coloridos por sinal ----
  var pts = [];
  var vals = [];
  meses.forEach(function(x, i){
    if(!x.dados) return;
    pts.push([xBand(i), yRes(resultados[i])]);
    vals.push(resultados[i]);
  });
  // desenhar segmentos par-a-par com cor conforme sinal do destino
  function corPorSinal(v){ return v>=0 ? 'var(--cya)' : 'var(--red)'; }
  for(var si=0; si<pts.length-1; si++){
    var a = pts[si], b = pts[si+1];
    var va = vals[si], vb = vals[si+1];
    // se cruza o zero, quebra o segmento em 2 cores
    if((va>=0) !== (vb>=0) && resBot<0){
      var yZero2 = yRes(0);
      // interpolação linear para achar x onde y = yZero
      var t = (yZero2 - a[1]) / (b[1] - a[1]);
      var xCross = a[0] + (b[0] - a[0]) * t;
      s += '<line x1="'+a[0]+'" y1="'+a[1]+'" x2="'+xCross+'" y2="'+yZero2+'" stroke="'+corPorSinal(va)+'" stroke-width="2" stroke-linecap="round"/>';
      s += '<line x1="'+xCross+'" y1="'+yZero2+'" x2="'+b[0]+'" y2="'+b[1]+'" stroke="'+corPorSinal(vb)+'" stroke-width="2" stroke-linecap="round"/>';
    } else {
      s += '<line x1="'+a[0]+'" y1="'+a[1]+'" x2="'+b[0]+'" y2="'+b[1]+'" stroke="'+corPorSinal(vb)+'" stroke-width="2" stroke-linecap="round"/>';
    }
  }
  // pontos: cor da borda conforme sinal, fill escuro
  pts.forEach(function(p, i){
    var cor = corPorSinal(vals[i]);
    s += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="5" fill="#0d1117" stroke="'+cor+'" stroke-width="2.5"/>';
  });

  // ---- eixo-x: labels dos meses (mes/ano curto) ----
  meses.forEach(function(x, i){
    var xc = xBand(i);
    var lblMes = nomesMes[x.m-1] + '/' + String(ano).slice(2);
    var ehParc = (x.m === mesParc);
    var corLbl = ehParc ? 'var(--blu)' : 'var(--dim)';
    var weight = ehParc ? '700' : '600';
    s += '<text x="'+xc+'" y="'+(mgT+plotH+20)+'" text-anchor="middle" fill="'+corLbl+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+lblMes+'</text>';
    // receita embaixo do label do mês
    if(receitas[i]>0){
      s += '<text x="'+xc+'" y="'+(mgT+plotH+36)+'" text-anchor="middle" fill="var(--blu)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">'+fk(receitas[i])+'</text>';
    }
    // resultado embaixo da receita (cor conforme sinal)
    if(x.dados){
      var r = resultados[i];
      var cor = r>0?'var(--cya)':(r<0?'var(--red)':'var(--mut)');
      s += '<text x="'+xc+'" y="'+(mgT+plotH+52)+'" text-anchor="middle" fill="'+cor+'" font-size="10" font-weight="600" font-family="JetBrains Mono,monospace">'+fk(r)+'</text>';
    }
  });

  s += '</svg></div>';
  return s;
}

// ========== BARRAS ANO A ANO ==========
function barrasAnoAno(titulo, campo, prefixo, sufixo, inverterCor, ehPct){
  var valores = D.anos.map(function(a){
    var dd = getDataAno(a);
    return dd ? dd[campo] : 0;
  });
  var maxV = Math.max.apply(null, valores.concat([0]));
  var minV = Math.min.apply(null, valores.concat([0]));
  var temNeg = minV < 0;
  // escala única simétrica — mesma referência para positivos e negativos
  var escala = Math.max(Math.abs(maxV), Math.abs(minV), 1);

  function fmtVal(v){
    if(ehPct) return f2(v)+sufixo;
    if(sufixo==='k') return prefixo+fk(v);
    return prefixo+f(v);
  }

  var out = '<div class="card" style="padding:12px"><div class="klb" style="margin-bottom:6px">'+titulo+'</div>';

  if(temNeg){
    // Layout com eixo-zero: cada metade usa a altura própria (100%) e escala independente
    out += '<div class="yybars yybars-neg">';
    D.anos.forEach(function(a, i){
      var v = valores[i];
      // escala única simétrica: módulo do valor sobre a escala global,
      // ocupa 0..100% do semi-container (metade acima ou abaixo do eixo zero)
      var pct = (Math.abs(v)/escala) * 100;
      var cls = 'bar';
      if(a === S.ano) cls += ' cur';
      else if(a === 2026) cls += ' parc';
      else if(v >= 0) cls += ' ok';
      else cls += ' bad';
      var valTxt = fmtVal(v);
      out += '<div class="col neg">';
      if(v >= 0){
        out += '<div class="half top">';
        out += '<div class="bar-wrap" style="height:'+pct+'%">';
        out += '<div class="barval">'+valTxt+'</div>';
        out += '<div class="'+cls+'" style="height:100%"></div>';
        out += '</div>';
        out += '</div>';
        out += '<div class="half bot"></div>';
      } else {
        out += '<div class="half top"></div>';
        out += '<div class="half bot">';
        out += '<div class="bar-wrap down" style="height:'+pct+'%">';
        out += '<div class="'+cls+' down" style="height:100%"></div>';
        out += '<div class="barval below">'+valTxt+'</div>';
        out += '</div>';
        out += '</div>';
      }
      out += '<div class="lbl'+(a===S.ano?' cur':'')+'">'+a+(a===2026?' YTD':'')+'</div>';
      out += '</div>';
    });
    out += '</div></div>';
    return out;
  }

  // --- Sem negativos: label acompanha a barra ---
  out += '<div class="yybars">';
  D.anos.forEach(function(a, i){
    var v = valores[i];
    var pct = escala>0 ? v/escala*100 : 0;
    var cls = 'bar';
    if(a === S.ano) cls += ' cur';
    else if(a === 2026) cls += ' parc';
    else if(v >= 0) cls += ' ok';
    else cls += ' bad';
    var valTxt = fmtVal(v);
    // .bar-wrap controla a altura; dentro dele, label + barra (label no topo, ambos sobem juntos)
    out += '<div class="col">';
    out += '<div class="bar-wrap" style="height:'+pct+'%">';
    out += '<div class="barval">'+valTxt+'</div>';
    out += '<div class="'+cls+'" style="height:100%"></div>';
    out += '</div>';
    out += '<div class="lbl'+(a===S.ano?' cur':'')+'">'+a+(a===2026?' YTD':'')+'</div>';
    out += '</div>';
  });
  out += '</div></div>';
  return out;
}

// ========== HEATMAP SAZONALIDADE ==========
function heatmapSazonalidade(){
  var nomesMes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  // matriz [ano][mes] = receita
  var mat = {};
  var maxV = 0;
  D.anos.forEach(function(a){
    mat[a] = [];
    for(var m=1;m<=12;m++){
      var ym = a+'-'+String(m).padStart(2,'0');
      var v = (D.ym_data[ym] && D.ym_data[ym].receita) || 0;
      mat[a].push(v);
      if(v>maxV) maxV=v;
    }
  });
  // calor por linha relativa ao máximo global do heatmap
  function corCell(v){
    if(v===0) return 'background:#161b22;color:#555';
    var ratio = Math.min(v/maxV, 1);
    // gradiente blu → cya → yel → red (quente = mais receita)
    // usar HSL para simplicidade
    var h = 210 - 150*ratio;  // 210 azul -> 60 amarelo -> 0 vermelho quando alto
    var s = 70;
    var l = 22 + 35*ratio; // mais claro = mais receita
    return 'background:hsl('+h+','+s+'%,'+l+'%);color:'+(ratio>0.5?'#000':'#fff');
  }

  var out = '<div class="klb" style="margin-bottom:8px">Intensidade da cor = receita do mês</div>';
  out += '<div class="heatmap">';
  // header: mês
  out += '<div class="hcell hd"></div>';
  nomesMes.forEach(function(n){ out += '<div class="hcell hd">'+n+'</div>'; });
  // linhas por ano
  D.anos.forEach(function(a){
    out += '<div class="hcell lbl">'+a+'</div>';
    for(var m=0;m<12;m++){
      var v = mat[a][m];
      if(v===0 && a===2026 && m>=D.ytd_mes){
        out += '<div class="hcell" style="background:#0d1117;color:#333;opacity:.25" title="ainda não aconteceu">—</div>';
      } else {
        out += '<div class="hcell" style="'+corCell(v)+'" title="'+a+'-'+String(m+1).padStart(2,'0')+': R$ '+f(v)+'">'+(v>0?fk(v):'')+'</div>';
      }
    }
  });
  out += '</div>';
  out += '<div style="font-size:10px;color:var(--mut);margin-top:8px;font-family:\'JetBrains Mono\',monospace">⬛ mais claro/quente = mais receita • valores em k (mil R$)</div>';
  return out;
}

// ========== LINHAS SOBREPOSTAS SAZONALIDADE ==========
function linhasSazonalidade(){
  var cores = {2022:'#7d8590', 2023:'#39d2c0', 2024:'#f0883e', 2025:'#bc8cff', 2026:'#3fb950'};
  var nomesMes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  var series = {};
  var maxV = 0;
  D.anos.forEach(function(a){
    series[a] = [];
    for(var m=1;m<=12;m++){
      var ym = a+'-'+String(m).padStart(2,'0');
      var v = (D.ym_data[ym] && D.ym_data[ym].receita) || null;
      series[a].push(v);
      if(v && v>maxV) maxV=v;
    }
  });

  // escala arredondada para cima — fica mais estético
  var niceMax = Math.ceil(maxV/100000)*100000;

  var W = 800, H = 300, padL=54, padR=18, padT=18, padB=30;
  var plotW = W - padL - padR;
  var plotH = H - padT - padB;
  var out = '<div class="klb" style="margin-bottom:4px">Todos os anos sobrepostos para comparar sazonalidade • passe o mouse sobre os pontos</div>';
  out += '<div class="linesbox"><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';

  // fundo sutil
  out += '<rect x="'+padL+'" y="'+padT+'" width="'+plotW+'" height="'+plotH+'" fill="rgba(88,166,255,0.02)" rx="4"/>';

  // grid Y (5 linhas horizontais)
  for(var g=0;g<=5;g++){
    var yy = padT + plotH*g/5;
    var valY = niceMax*(1 - g/5);
    var isBase = (g===5);
    out += '<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="'+(isBase?'#30363d':'#21262d')+'" stroke-width="1"'+(isBase?'':' stroke-dasharray="2 3"')+'/>';
    out += '<text x="'+(padL-8)+'" y="'+(yy+3.5)+'" fill="#7d8590" font-size="10" font-family="JetBrains Mono" text-anchor="end">'+fk(valY)+'</text>';
  }

  // grid X sutil (por mês)
  for(var m=0;m<12;m++){
    var xx = padL + plotW*m/11;
    out += '<line x1="'+xx+'" y1="'+padT+'" x2="'+xx+'" y2="'+(padT+plotH)+'" stroke="#21262d" stroke-width="1" stroke-dasharray="1 4" opacity="0.5"/>';
    out += '<text x="'+xx+'" y="'+(H-8)+'" fill="#a8b2be" font-size="11" font-family="Plus Jakarta Sans" font-weight="600" text-anchor="middle">'+nomesMes[m]+'</text>';
  }

  // linhas por ano — ordem: anos mais antigos primeiro (ficam atrás), anos recentes por cima
  var anosOrd = D.anos.slice();
  D.anos.forEach(function(a){
    var cor = cores[a];
    var isCur = (a===S.ano);
    var isParc = (a===2026);
    var pts = [];
    var pontosObj = [];
    for(var m=0;m<12;m++){
      var v = series[a][m];
      if(v===null || v===0) continue;
      var xx = padL + plotW*m/11;
      var yy = padT + plotH*(1 - v/niceMax);
      pts.push(xx+','+yy);
      pontosObj.push({x:xx, y:yy, v:v, m:m});
    }
    if(pts.length>0){
      var strokeW = isCur?3:1.8;
      var opac = isCur?1:(S.ano && !isCur?0.55:1);
      // path suavizado (linha reta entre pontos — mantém clareza)
      out += '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+cor+'" stroke-width="'+strokeW+'" '+(isParc?'stroke-dasharray="5 3"':'')+' opacity="'+opac+'" stroke-linecap="round" stroke-linejoin="round"/>';
      // círculos nos pontos com hover
      pontosObj.forEach(function(p){
        var r = isCur?4:3;
        out += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="'+cor+'" stroke="#0d1117" stroke-width="1.5" opacity="'+opac+'"><title>'+a+' • '+nomesMes[p.m]+': R$ '+f(p.v)+'</title></circle>';
      });
    }
  });
  out += '</svg></div>';
  // legenda melhorada
  out += '<div class="lineslegend">';
  D.anos.forEach(function(a){
    var isCur = (a===S.ano);
    var peso = isCur?'700':'600';
    var op = isCur?'1':'0.75';
    out += '<span style="font-weight:'+peso+';opacity:'+op+'"><i style="background:'+cores[a]+';'+(isCur?'height:4px;':'')+'"></i>'+a+(a===2026?' (parc.)':'')+(isCur?' ●':'')+'</span>';
  });
  out += '</div>';
  return out;
}

// ========== TOP 10 CLIENTES ==========
function renderTopClientes(){
  var ano = S.ano;
  var clientes = getTopCliAno(ano).slice();

  // busca
  if(S.busca_cli) clientes = clientes.filter(function(c){return matchSearch(c.c, S.busca_cli);});
  // ordenação

// ========== RETIRADAS SÓCIOS + SOBRA ==========
function renderSocios(){
  var out = '<div class="sc">RETIRADAS DOS SÓCIOS & SOBRA POTENCIAL <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">Thompson Jacon Cavalcante e Glauco Cicero Barbosa · Pro-labore (3.4.07), Salários (3.4.08) e/ou Comissões (2.3.02) conforme o ano · Resultado Gerencial = sobra após pagar sócios = potencial dividendo</small></div>';
  out += '<div class="card">';
  out += '<div class="socbox">';

  // cada ano como card — agora usando totais reais (pro_labore + comissao por fornecedor)
  D.anos.forEach(function(a){
    var dd = getDataAno(a);
    if(!dd) return;
    var det = sociosDetDoPeriodo(a);
    var th = det.Thompson || {pro_labore:0,comissao:0,total:0};
    var gl = det.Glauco   || {pro_labore:0,comissao:0,total:0};
    var ret = (th.total || 0) + (gl.total || 0);
    var res = dd.resultado || 0;
    var totSoma = ret + Math.max(res, 0);
    var pctTh  = totSoma>0 ? (th.total||0)/totSoma*100 : 0;
    var pctGl  = totSoma>0 ? (gl.total||0)/totSoma*100 : 0;
    var pctRes = totSoma>0 ? Math.max(res,0)/totSoma*100 : 0;
    out += '<div class="socyr '+(a===S.ano?'hi':'')+'">';
    out += '<div class="socyrh"><span class="yr">'+a+(a===2026?' YTD':(S.modo==='ytd'?' YTD':''))+'</span><span class="tot">R$ '+f(dd.receita)+' receita</span></div>';
    // Thompson
    out += '<div class="socrow"><span class="nm">Thompson</span><span class="vl" style="color:var(--pur)">R$ '+f(th.total)+'</span></div>';
    // Glauco
    out += '<div class="socrow"><span class="nm">Glauco</span><span class="vl" style="color:var(--cya)">R$ '+f(gl.total)+'</span></div>';
    // Total
    out += '<div class="socrow" style="border-top:1px solid var(--brd);padding-top:6px;margin-top:3px"><span class="nm"><b>Total retiradas</b></span><span class="vl"><b>R$ '+f(ret)+'</b></span></div>';
    var corRes = res>=0?'var(--grn)':'var(--red)';
    out += '<div class="socrow"><span class="nm">Resultado Gerencial (sobra)</span><span class="vl" style="color:'+corRes+';font-weight:700">'+(res<0?'−':'')+'R$ '+f(Math.abs(res))+'</span></div>';
    if(totSoma>0){
      out += '<div class="sobra-bar">';
      if(pctTh>0)  out += '<div style="background:var(--pur);width:'+pctTh+'%" title="Thompson">'+(pctTh>=10?f2(pctTh)+'%':'')+'</div>';
      if(pctGl>0)  out += '<div style="background:var(--cya);width:'+pctGl+'%" title="Glauco">'+(pctGl>=10?f2(pctGl)+'%':'')+'</div>';
      if(pctRes>0) out += '<div style="background:var(--grn);width:'+pctRes+'%" title="Sobra/Dividendo">'+(pctRes>=10?f2(pctRes)+'%':'')+'</div>';
      out += '</div>';
      out += '<div style="font-size:9px;color:var(--mut);margin-top:4px;font-family:\'JetBrains Mono\',monospace">Distribuição de R$ '+f(totSoma)+' (<span style="color:var(--pur)">■</span> Thompson <span style="color:var(--cya)">■</span> Glauco <span style="color:var(--grn)">■</span> Sobra)</div>';
    } else if(res<0){
      out += '<div style="font-size:10px;color:var(--red);margin-top:6px;font-weight:600">⚠ Prejuízo: sócios retiraram mais do que a empresa gerou</div>';
    }
    out += '</div>';
  });

  // ===== Card CONSOLIDADO (soma de todos os anos) =====
  var cTh = 0, cGl = 0, cRec = 0, cRes = 0;
  D.anos.forEach(function(a){
    var dd = getDataAno(a);
    if(!dd) return;
    var det = sociosDetDoPeriodo(a);
    cTh  += ((det.Thompson && det.Thompson.total) || 0);
    cGl  += ((det.Glauco && det.Glauco.total) || 0);
    cRec += dd.receita || 0;
    cRes += dd.resultado || 0;
  });
  var cRet = cTh + cGl;
  var cTot = cRet + Math.max(cRes, 0);
  var cPctTh  = cTot>0 ? cTh/cTot*100 : 0;
  var cPctGl  = cTot>0 ? cGl/cTot*100 : 0;
  var cPctRes = cTot>0 ? Math.max(cRes,0)/cTot*100 : 0;
  var periodoTxt = (D.anos[0]) + '–' + (D.anos[D.anos.length-1]);
  out += '<div class="socyr" style="border:1px solid var(--blu);background:rgba(88,166,255,0.04)">';
  out += '<div class="socyrh"><span class="yr" style="color:var(--blu)">CONSOLIDADO <span style="font-size:10px;color:var(--mut);font-weight:500">('+periodoTxt+')</span></span><span class="tot">R$ '+f(cRec)+' receita</span></div>';
  out += '<div class="socrow"><span class="nm">Thompson</span><span class="vl" style="color:var(--pur)">R$ '+f(cTh)+'</span></div>';
  out += '<div class="socrow"><span class="nm">Glauco</span><span class="vl" style="color:var(--cya)">R$ '+f(cGl)+'</span></div>';
  out += '<div class="socrow" style="border-top:1px solid var(--brd);padding-top:6px;margin-top:3px"><span class="nm"><b>Total retiradas</b></span><span class="vl"><b>R$ '+f(cRet)+'</b></span></div>';
  var cCorRes = cRes>=0?'var(--grn)':'var(--red)';
  out += '<div class="socrow"><span class="nm">Resultado Gerencial (sobra)</span><span class="vl" style="color:'+cCorRes+';font-weight:700">'+(cRes<0?'−':'')+'R$ '+f(Math.abs(cRes))+'</span></div>';
  if(cTot>0){
    out += '<div class="sobra-bar">';
    if(cPctTh>0)  out += '<div style="background:var(--pur);width:'+cPctTh+'%" title="Thompson">'+(cPctTh>=10?f2(cPctTh)+'%':'')+'</div>';
    if(cPctGl>0)  out += '<div style="background:var(--cya);width:'+cPctGl+'%" title="Glauco">'+(cPctGl>=10?f2(cPctGl)+'%':'')+'</div>';
    if(cPctRes>0) out += '<div style="background:var(--grn);width:'+cPctRes+'%" title="Sobra/Dividendo">'+(cPctRes>=10?f2(cPctRes)+'%':'')+'</div>';
    out += '</div>';
    // comparativo direto Thompson vs Glauco
    var difAbs = cGl - cTh;
    var difPct = cTh>0 ? ((cGl-cTh)/cTh*100) : null;
    var corDif = difAbs>=0 ? 'var(--cya)' : 'var(--pur)';
    var quem = difAbs>=0 ? 'Glauco retirou mais' : 'Thompson retirou mais';
    var detDif = 'R$ '+f(Math.abs(difAbs)) + (difPct!==null ? ' ('+(difAbs>=0?'+':'−')+f2(Math.abs(difPct))+'%)' : '');
    out += '<div style="font-size:10px;color:var(--mut);margin-top:6px;line-height:1.5">';
    out += '<div style="font-family:\'JetBrains Mono\',monospace">Distribuição de R$ '+f(cTot)+' (<span style="color:var(--pur)">■</span> Thompson <span style="color:var(--cya)">■</span> Glauco <span style="color:var(--grn)">■</span> Sobra)</div>';
    out += '<div style="margin-top:3px"><b style="color:'+corDif+'">'+quem+'</b>: '+detDif+' no período</div>';
    out += '</div>';
  }
  out += '</div>';

  out += '</div>';

  // ----- Gráfico comparativo entre sócios (barras agrupadas) -----
  out += '<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--brd)">';
  out += '<div class="klb" style="margin-bottom:8px">COMPARATIVO DE RETIRADAS POR SÓCIO <span style="color:var(--mut);font-weight:400;text-transform:none">(R$ total: pro-labore + comissão por fornecedor)</span></div>';
  out += svgSociosComparativo();
  out += '</div>';

  out += '</div>';
  return out;
}

// ========== SVG barras agrupadas Thompson x Glauco por ano ==========
function svgSociosComparativo(){
  var W = 900, H = 260;
  var mgT = 28, mgB = 44, mgL = 60, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // coletar valores por sócio
  var rows = D.anos.map(function(a){
    var det = sociosDetDoPeriodo(a);
    return {
      ano: a,
      th:  (det.Thompson && det.Thompson.total) || 0,
      gl:  (det.Glauco && det.Glauco.total) || 0,
    };
  });
  var maxV = 0;
  rows.forEach(function(r){ if(r.th>maxV) maxV=r.th; if(r.gl>maxV) maxV=r.gl; });
  if(maxV===0) maxV = 1;
  var yTop = maxV * 1.12;

  function niceTickStep(range, approxTicks){
    if(range<=0) return 1;
    var raw = range / approxTicks;
    var p = Math.pow(10, Math.floor(Math.log10(raw)));
    var n_ = raw/p;
    var step = n_<1.5?1:(n_<3?2:(n_<7?5:10));
    return step * p;
  }
  var stepY = niceTickStep(yTop, 4);
  var yTicks = [];
  for(var tk=0; tk*stepY <= yTop + stepY*0.01; tk++){ yTicks.push(tk*stepY); }
  if(yTicks[yTicks.length-1] < yTop){ yTicks.push(yTicks[yTicks.length-1]+stepY); }
  var yTopReal = yTicks[yTicks.length-1];

  // geometria — duas barras por grupo (Thompson em roxo, Glauco em ciano)
  var bandW = plotW / n;
  var gap = Math.max(18, bandW * 0.28);   // espaço entre grupos
  var innerGap = 4;                        // espaço entre as 2 barras do mesmo grupo
  var grupoW = bandW - gap;
  var barW = (grupoW - innerGap) / 2;
  function xGrupo(i){ return mgL + i*bandW + gap/2; }
  function yPos(v){ return mgT + plotH - (v/yTopReal)*plotH; }

  var s = '<div style="width:100%">';
  s += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // gradientes
  s += '<defs>';
  s += '<linearGradient id="gradSocTh" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#d7b8ff" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#a277f0" stop-opacity="1"/>';
  s += '<stop offset="100%" stop-color="#6a4bb3" stop-opacity="0.95"/>';
  s += '</linearGradient>';
  s += '<linearGradient id="gradSocGl" x1="0%" y1="0%" x2="0%" y2="100%">';
  s += '<stop offset="0%" stop-color="#7de8d8" stop-opacity="1"/>';
  s += '<stop offset="55%" stop-color="#39d2c0" stop-opacity="1"/>';
  s += '<stop offset="100%" stop-color="#1a8c7f" stop-opacity="0.95"/>';
  s += '</linearGradient>';
  s += '</defs>';

  // grid + labels Y
  yTicks.forEach(function(v){
    var y = yPos(v);
    s += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    s += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">R$ '+fk(v)+'</text>';
  });

  // barras
  rows.forEach(function(r, i){
    var x0 = xGrupo(i);
    // Thompson
    if(r.th>0){
      var yTh = yPos(r.th);
      var hTh = mgT+plotH - yTh;
      s += '<rect x="'+x0+'" y="'+yTh+'" width="'+barW+'" height="'+hTh+'" rx="3" ry="3" fill="url(#gradSocTh)"/>';
      s += '<text x="'+(x0+barW/2)+'" y="'+(yTh-5)+'" text-anchor="middle" fill="var(--pur)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">'+fk(r.th)+'</text>';
    }
    // Glauco
    if(r.gl>0){
      var xGl = x0+barW+innerGap;
      var yGl = yPos(r.gl);
      var hGl = mgT+plotH - yGl;
      s += '<rect x="'+xGl+'" y="'+yGl+'" width="'+barW+'" height="'+hGl+'" rx="3" ry="3" fill="url(#gradSocGl)"/>';
      s += '<text x="'+(xGl+barW/2)+'" y="'+(yGl-5)+'" text-anchor="middle" fill="var(--cya)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">'+fk(r.gl)+'</text>';
    }
    // label do ano embaixo do grupo
    var ehCur = (r.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    var xCentro = x0 + grupoW/2;
    s += '<text x="'+xCentro+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+r.ano+(r.ano===2026?' YTD':'')+'</text>';
  });

  s += '</svg></div>';
  // legenda
  s += '<div style="display:flex;gap:16px;justify-content:center;margin-top:4px;font-size:11px;color:var(--dim);font-weight:600">';
  s += '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:4px;border-radius:2px;background:var(--pur)"></span>Thompson</span>';
  s += '<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:4px;border-radius:2px;background:var(--cya)"></span>Glauco</span>';
  s += '</div>';
  return s;
}

// ========== CONCENTRAÇÃO TOP 5 AO LONGO DOS ANOS ==========
function renderConcentracao(){
  var out = '<div class="sc">EVOLUÇÃO DA CONCENTRAÇÃO (TOP 5 CLIENTES)</div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:8px">% que os 5 maiores clientes representam do faturamento (quanto menor, mais diversificado) <span style="color:var(--yel);margin-left:6px">• limites: 30% e 50%</span></div>';

  // para cada ano: calcula % de concentração e guarda o top 5 (nome+fat) para o tooltip
  var top5Ano = {};
  var pcts = D.anos.map(function(a){
    var cl = topCliDoPeriodo(a);
    var top5arr = cl.slice(0,5);
    var top5 = top5arr.reduce(function(ac,x){return ac+x.fat;},0);
    var total = cl.reduce(function(ac,x){return ac+x.fat;},0);
    top5Ano[a] = top5arr.map(function(x){
      // primeiro "nome" = primeira palavra significativa (razão social costuma começar com pessoa ou empresa)
      var nome = String(x.c||'').trim().split(/\s+/)[0];
      return {n: nome, v: x.fat};
    });
    return total>0 ? top5/total*100 : 0;
  });
  var LIM_OK = 30;   // abaixo = verde (diversificado)
  var LIM_BAD = 50;  // acima = vermelho (alta dependência)

  // dimensões SVG responsivas via aspect-ratio
  var W = 900, H = 260;
  var mgT = 30, mgB = 44, mgL = 46, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // topo: max(valores, 60%) + folga de 12%
  var maxV = Math.max.apply(null, pcts.concat([60]));
  var yTop = maxV * 1.12;
  function xPos(i){ return mgL + (plotW / (n - 1)) * i; }
  function yPos(v){ return mgT + plotH - (v / yTop) * plotH; }

  // cor por faixa: <30 grn, 30-50 yel, ≥50 red
  function corFaixa(v){
    if(v>=LIM_BAD) return 'var(--red)';
    if(v>=LIM_OK)  return 'var(--yel)';
    return 'var(--grn)';
  }

  out += '<div style="width:100%">';
  out += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // ---- defs: três gradientes verticais (verde, amarelo, vermelho) ----
  out += '<defs>';
  out += '<linearGradient id="gradConOk" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#3fb950" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradConWarn" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#d29922" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#d29922" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradConBad" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#f85149" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#f85149" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  // clipPaths: 3 faixas verticais definidas pelas linhas 30% e 50%
  var yOk = yPos(LIM_OK);
  var yBad = yPos(LIM_BAD);
  out += '<clipPath id="clipZonaOk"><rect x="0" y="'+yOk+'" width="'+W+'" height="'+(mgT + plotH - yOk)+'"/></clipPath>';
  out += '<clipPath id="clipZonaWarn"><rect x="0" y="'+yBad+'" width="'+W+'" height="'+(yOk - yBad)+'"/></clipPath>';
  out += '<clipPath id="clipZonaBad"><rect x="0" y="'+mgT+'" width="'+W+'" height="'+(yBad - mgT)+'"/></clipPath>';
  out += '</defs>';

  // ---- grid horizontal + labels do eixo Y ----
  var yTicks = 4;
  for(var g=0; g<=yTicks; g++){
    var v = yTop * g / yTicks;
    var y = yPos(v);
    out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    out += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+f2(v)+'%</text>';
  }

  // ---- linhas dos limites (30% verde-amarelo / 50% amarelo-vermelho) — tracejadas ----
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yOk+'" y2="'+yOk+'" stroke="var(--grn)" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yOk-6)+'" text-anchor="end" fill="var(--grn)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 30%</text>';
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yBad+'" y2="'+yBad+'" stroke="var(--red)" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yBad-6)+'" text-anchor="end" fill="var(--red)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 50%</text>';

  // ---- pontos ----
  var pts = [];
  D.anos.forEach(function(a, i){
    pts.push({ano:a, v:pcts[i], x:xPos(i), y:yPos(pcts[i])});
  });

  // ---- área preenchida, recortada em 3 faixas ----
  var areaD = 'M '+pts[0].x+' '+(mgT+plotH)+' ';
  pts.forEach(function(p){ areaD += 'L '+p.x+' '+p.y+' '; });
  areaD += 'L '+pts[pts.length-1].x+' '+(mgT+plotH)+' Z';
  out += '<path d="'+areaD+'" fill="url(#gradConOk)"   clip-path="url(#clipZonaOk)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradConWarn)" clip-path="url(#clipZonaWarn)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradConBad)"  clip-path="url(#clipZonaBad)"/>';

  // ---- linha: segmentos coloridos por faixa (quebra no cruzamento de cada limite) ----
  function interpY(a, b, yAlvo){
    // retorna x onde o segmento ab cruza y=yAlvo (assumindo cruzamento existe)
    var t = (yAlvo - a.y) / (b.y - a.y);
    return a.x + (b.x - a.x) * t;
  }
  for(var si=0; si<pts.length-1; si++){
    var a = pts[si], b = pts[si+1];
    // identifica cruzamentos desse segmento com os 2 limites
    var cruzou = [];
    [LIM_OK, LIM_BAD].forEach(function(lim){
      if((a.v - lim) * (b.v - lim) < 0){
        var yL = yPos(lim);
        cruzou.push({x:interpY(a,b,yL), y:yL, v:lim});
      }
    });
    // ordena cruzamentos ao longo do segmento (por x crescente se b.x>a.x)
    cruzou.sort(function(p1,p2){return (b.x>a.x?1:-1)*(p1.x-p2.x);});
    // desenha sub-segmentos
    var sub = [a].concat(cruzou).concat([b]);
    for(var sj=0; sj<sub.length-1; sj++){
      var s1 = sub[sj], s2 = sub[sj+1];
      // cor do sub-segmento: usa o valor do ponto médio (mais estável que extremos)
      var vMid = (s1===a ? a.v : s1.v) + ((s2===b ? b.v : s2.v) - (s1===a ? a.v : s1.v)) * 0.5;
      // como s1/s2 podem ser cruzamentos (com v=LIM), usamos a faixa correspondente ao "lado" da curva
      // abordagem simples: pega o valor médio em y e converte
      var yMid = (s1.y + s2.y) / 2;
      var vAtMid = yTop - (yMid - mgT)/plotH*yTop;
      var cor = corFaixa(vAtMid);
      out += '<line x1="'+s1.x+'" y1="'+s1.y+'" x2="'+s2.x+'" y2="'+s2.y+'" stroke="'+cor+'" stroke-width="1.5" stroke-linecap="round"/>';
    }
  }

  // ---- pontos + label do valor ----
  pts.forEach(function(p){
    var cor = corFaixa(p.v);
    // dados JSON dos top 5 deste ano, codificados com escape mínimo para caber em atributo
    var lst = top5Ano[p.ano] || [];
    var dados = lst.map(function(x){return (x.n||'').replace(/"/g,'')+'|'+Math.round(x.v);}).join(';;');
    // círculo visível
    out += '<circle class="con-dot" data-ano="'+p.ano+'" data-top5="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#0d1117" stroke="'+cor+'" stroke-width="1.8" style="cursor:pointer"/>';
    // área de clique maior invisível sobre o círculo (hit area)
    out += '<circle class="con-dot con-hit" data-ano="'+p.ano+'" data-top5="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent" style="cursor:pointer"/>';
    out += '<text x="'+p.x+'" y="'+(p.y - 12)+'" text-anchor="middle" fill="'+cor+'" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">'+f2(p.v)+'%</text>';
  });

  // ---- eixo X: anos ----
  pts.forEach(function(p){
    var ehCur = (p.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    out += '<text x="'+p.x+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+p.ano+(p.ano===2026?' YTD':'')+'</text>';
  });

  out += '</svg>';
  out += '</div>';

  out += '<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">';
  out += '<span style="color:var(--grn)">Verde</span>: &lt;30% — diversificada. ';
  out += '<span style="color:var(--yel)">Amarelo</span>: 30-50% — atenção. ';
  out += '<span style="color:var(--red)">Vermelho</span>: ≥50% — alta dependência.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== DESPESAS POR CATEGORIA ==========
function renderDespesas(){
  var ano = S.ano;
  var cats = getDespCatsFullAno(ano);
  var catsAnt = getDespCatsFullAno(ano-1);
  // mapear anterior por descrição
  var catsAntMap = {};
  catsAnt.forEach(function(c){ catsAntMap[c.d] = c.v; });

  var totalAno = cats.reduce(function(a,c){return a+c.v;},0);
  var maxVal = Math.max.apply(null, cats.map(function(c){return c.v;}).concat([1]));

  var out = '<div class="sc">DESPESAS POR SUB-CONTA — '+nomeAno(ano)+' <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">'+cats.length+' sub-contas ordenadas por valor · Δ vs '+(ano-1)+'</small></div>';
  out += '<div class="card">';

  if(cats.length===0){
    out += '<div style="padding:10px;color:var(--mut);text-align:center">Sem dados de despesas.</div>';
    out += '</div>';
    return out;
  }

  // Header
  out += '<div class="prog-head"><span class="col-lbl">Sub-conta</span><span><span class="col-lbl" style="margin-right:16px">Valor</span><span class="col-lbl" style="margin-right:10px">% Total</span><span class="col-lbl">Δ vs '+(ano-1)+'</span></span></div>';

  cats.forEach(function(c){
    var pct = totalAno>0 ? c.v/totalAno*100 : 0;
    var pctBar = maxVal>0 ? c.v/maxVal*100 : 0;
    var prev = catsAntMap[c.d];
    var deltaTxt = '<span class="prdelta neu">novo</span>';
    if(prev !== undefined && prev > 0){
      var d_ = (c.v-prev)/prev*100;
      // despesa aumentou = ruim (vermelho ▲), caiu = bom (verde ▼)
      var cls = d_<0?'up':(d_>0?'dn':'neu');
      var seta = d_>0?'▲':(d_<0?'▼':'•');
      deltaTxt = '<span class="prdelta '+cls+'">'+seta+(d_>0?'+':'')+f2(d_)+'%</span>';
    }
    out += '<div class="prog">';
    out += '<div class="prh"><span class="cat">'+c.d+' <span style="color:var(--mut);font-size:10px;font-family:\'JetBrains Mono\',monospace">('+c.g+')</span></span>';
    out += '<span style="display:flex;align-items:center;gap:10px;flex-shrink:0">';
    out += '<span class="prv" style="min-width:92px;text-align:right">R$ '+f(c.v)+'</span>';
    out += '<span style="color:var(--dim);font-size:10px;font-family:\'JetBrains Mono\',monospace;min-width:48px;text-align:right">'+f2(pct)+'%</span>';
    out += '<span style="min-width:72px;text-align:right">'+deltaTxt+'</span>';
    out += '</span>';
    out += '</div>';
    out += '<div class="prb"><div class="prf" style="width:'+pctBar+'%;background:'+c.co+'"></div></div>';
    out += '</div>';
  });

  out += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--brd);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">';
  out += '<span>'+cats.length+' sub-contas com movimentação no período</span>';
  out += '<span>Total: <b style="color:var(--txt);font-family:\'JetBrains Mono\',monospace">R$ '+f(totalAno)+'</b></span>';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== PMR / PMP ==========
function renderPmrPmp(){
  var lbl = labelPeriodo();
  // escala de cor para Atraso PMR / Atraso PMP (em dias, valor absoluto)
  function corAtraso(d){
    if(d===null||d===undefined||isNaN(d)) return 'var(--mut)';
    var v = Math.abs(d);
    if(v<2)  return 'var(--grn)';
    if(v<5)  return 'var(--yel)';
    if(v<10) return 'var(--ora)';
    return 'var(--red)';
  }
  // cor do Ciclo (PMP-PMR): positivo = verde, negativo = vermelho
  function corCiclo(d){
    if(d===null||d===undefined||isNaN(d)) return 'var(--mut)';
    return d>=0 ? 'var(--grn)' : 'var(--red)';
  }
  var out = '<div class="sc">PRAZOS MÉDIOS — RECEBIMENTO & PAGAMENTO <small style="font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);margin-left:8px">'+lbl+' · ponderado por valor</small></div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:10px">Evolução do PMR (dias até receber do cliente) e PMP (dias até pagar o fornecedor) — quanto maior o PMP em relação ao PMR, melhor o fluxo de caixa</div>';
  out += '<div class="tblwrap"><table class="dre"><thead><tr><th class="l">Ano</th><th>PMR Concedido</th><th>PMR Efetivo</th><th>Atraso PMR</th><th>PMP Concedido</th><th>PMP Efetivo</th><th>Atraso PMP</th><th>Ciclo (PMP−PMR)</th></tr></thead><tbody>';
  D.anos.forEach(function(a){
    var p = pmrPmpDoPeriodo(a);
    if(!p) return;
    var atrasoR = (p.pmr_efetivo!==null && p.pmr_concedido!==null)?(p.pmr_efetivo-p.pmr_concedido):null;
    var atrasoP = (p.pmp_efetivo!==null && p.pmp_concedido!==null)?(p.pmp_efetivo-p.pmp_concedido):null;
    var ciclo = (p.pmp_efetivo!==null && p.pmr_efetivo!==null)?(p.pmp_efetivo-p.pmr_efetivo):null;
    var corAtR  = corAtraso(atrasoR);
    var corAtP  = corAtraso(atrasoP);
    var corCic  = corCiclo(ciclo);
    out += '<tr'+(a===S.ano?' style="background:var(--card-h)"':'')+'>';
    out += '<td class="l"><b>'+a+'</b></td>';
    out += '<td class="vl" style="color:var(--blu)">'+(p.pmr_concedido!==null?f2(p.pmr_concedido)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--blu)">'+(p.pmr_efetivo!==null?f2(p.pmr_efetivo)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corAtR+'">'+(atrasoR!==null?(atrasoR>=0?'+':'')+f2(atrasoR)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--cya)">'+(p.pmp_concedido!==null?f2(p.pmp_concedido)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:var(--cya)">'+(p.pmp_efetivo!==null?f2(p.pmp_efetivo)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corAtP+'">'+(atrasoP!==null?(atrasoP>=0?'+':'')+f2(atrasoP)+' d':'—')+'</td>';
    out += '<td class="vl" style="color:'+corCic+'"><b>'+(ciclo!==null?(ciclo>=0?'+':'')+f2(ciclo)+' d':'—')+'</b></td>';
    out += '</tr>';
  });
  out += '</tbody></table></div>';
  out += '<div style="font-size:10px;color:var(--mut);margin-top:10px;line-height:1.55">';
  out += '<b style="color:var(--txt)">PMR</b>: média (ponderada por valor) dos dias entre emissão e recebimento do cliente. <b style="color:var(--txt)">PMP</b>: idem para pagamento ao fornecedor (excluindo pessoal e investimentos). ';
  out += '<b style="color:var(--txt)">Atraso</b>: diferença entre efetivo e concedido (quanto atrasou em relação ao combinado). ';
  out += '<b style="color:var(--txt)">Ciclo positivo</b>: paga depois de receber (bom para caixa). ';
  out += '<b style="color:var(--txt)">Ciclo negativo</b>: paga antes de receber (precisa de capital de giro). ';
  out += 'Em <b>2023/2024</b> o atraso alto no PMP reflete principalmente o atraso com a ICAC e outros fornecedores de matéria-prima.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== INADIMPLÊNCIA ==========
function renderInadimplencia(){
  var out = '<div class="sc">INADIMPLÊNCIA (VENCIDOS NÃO PAGOS)</div>';
  out += '<div class="card">';
  out += '<div class="klb" style="margin-bottom:8px">% do faturamento por ano de recebimentos em aberto <span style="color:var(--yel);margin-left:6px">• limite: &lt; 2%</span></div>';

  // coleta % e detalhes (valor em R$ e total faturado) para cada ano
  var inadDet = {};
  var pcts = D.anos.map(function(a){
    var i = inadDoPeriodo(a);
    inadDet[a] = {
      pct: i?i.pct:0,
      inad: i?i.inadimplente:0,
      total: i?i.total_faturado:0
    };
    return i?i.pct:0;
  });
  var META = 2.0;

  // dimensões SVG — responsivo via aspect-ratio
  var W = 900, H = 260;
  var mgT = 30, mgB = 44, mgL = 46, mgR = 20;
  var plotW = W - mgL - mgR;
  var plotH = H - mgT - mgB;
  var n = D.anos.length;

  // escala Y: topo = max(valores, limite*2) + 10% folga
  var maxV = Math.max.apply(null, pcts.concat([META * 2]));
  var yTop = maxV * 1.12;
  function xPos(i){ return mgL + (plotW / (n - 1)) * i; }
  function yPos(v){ return mgT + plotH - (v / yTop) * plotH; }

  out += '<div style="width:100%">';
  out += '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;aspect-ratio:'+W+'/'+H+';overflow:visible">';

  // ---- defs: gradientes verde e vermelho para a área ----
  out += '<defs>';
  out += '<linearGradient id="gradInadOk" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#3fb950" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  out += '<linearGradient id="gradInadBad" x1="0%" y1="0%" x2="0%" y2="100%">';
  out += '<stop offset="0%" stop-color="#f85149" stop-opacity="0.55"/>';
  out += '<stop offset="100%" stop-color="#f85149" stop-opacity="0.05"/>';
  out += '</linearGradient>';
  // clipPaths: dividir a área em "abaixo do limite" e "acima do limite"
  out += '<clipPath id="clipAcimaMeta"><rect x="0" y="'+mgT+'" width="'+W+'" height="'+(yPos(META) - mgT)+'"/></clipPath>';
  out += '<clipPath id="clipAbaixoMeta"><rect x="0" y="'+yPos(META)+'" width="'+W+'" height="'+(mgT + plotH - yPos(META))+'"/></clipPath>';
  out += '</defs>';

  // ---- grid horizontal + labels do eixo Y ----
  var yTicks = 4;
  for(var g=0; g<=yTicks; g++){
    var v = yTop * g / yTicks;
    var y = yPos(v);
    out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+y+'" y2="'+y+'" stroke="var(--brd)" stroke-dasharray="3,4" stroke-width="1" opacity="0.5"/>';
    out += '<text x="'+(mgL-8)+'" y="'+(y+4)+'" text-anchor="end" fill="var(--mut)" font-size="10" font-family="JetBrains Mono,monospace">'+f2(v)+'%</text>';
  }

  // ---- linha do limite (2%) — tracejada amarela, atravessa todo o plot ----
  var yMeta = yPos(META);
  out += '<line x1="'+mgL+'" x2="'+(W-mgR)+'" y1="'+yMeta+'" y2="'+yMeta+'" stroke="var(--yel)" stroke-width="1" stroke-dasharray="5,4" opacity="0.75"/>';
  out += '<text x="'+(W-mgR-6)+'" y="'+(yMeta-6)+'" text-anchor="end" fill="var(--yel)" font-size="10" font-weight="700" font-family="JetBrains Mono,monospace">limite 2,00%</text>';

  // ---- pontos reais ----
  var pts = [];
  D.anos.forEach(function(a, i){
    pts.push({ano:a, v:pcts[i], x:xPos(i), y:yPos(pcts[i])});
  });

  // ---- área preenchida (caminho fechado até a baseline) ----
  // construir polyline dos pontos da curva
  var curva = pts.map(function(p){ return p.x+','+p.y; }).join(' ');
  var xFim = pts[pts.length-1].x;
  var xIni = pts[0].x;
  var baseY = mgT + plotH;
  var areaPath = 'M '+xIni+','+baseY+' L ' + curva.replace(/,/g,' ').replace(/ /g,',').replace(/,/g,' ') + ' L '+xFim+','+baseY+' Z';
  // Aproximação mais simples:
  var areaD = 'M '+xIni+' '+baseY+' ';
  pts.forEach(function(p){ areaD += 'L '+p.x+' '+p.y+' '; });
  areaD += 'L '+xFim+' '+baseY+' Z';

  // desenhar a mesma área duas vezes, com clipPaths diferentes (verde abaixo, vermelho acima da meta)
  out += '<path d="'+areaD+'" fill="url(#gradInadOk)"  clip-path="url(#clipAbaixoMeta)"/>';
  out += '<path d="'+areaD+'" fill="url(#gradInadBad)" clip-path="url(#clipAcimaMeta)"/>';

  // ---- linha (segmentos coloridos por posição relativa à meta) ----
  // se um segmento cruza a meta, dividir em dois no ponto exato
  function corPos(v){ return v > META ? 'var(--red)' : 'var(--grn)'; }
  for(var si=0; si<pts.length-1; si++){
    var a = pts[si], b = pts[si+1];
    var cruzaMeta = (a.v > META) !== (b.v > META);
    if(cruzaMeta){
      // interpolar ponto de cruzamento
      var t = (META - a.v) / (b.v - a.v);
      var xC = a.x + (b.x - a.x) * t;
      var yC = yMeta;
      out += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+xC+'" y2="'+yC+'" stroke="'+corPos(a.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
      out += '<line x1="'+xC+'" y1="'+yC+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+corPos(b.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
    } else {
      out += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+corPos(b.v)+'" stroke-width="1.5" stroke-linecap="round"/>';
    }
  }

  // ---- pontos com fill escuro + borda colorida + label do % acima ----
  pts.forEach(function(p){
    var cor = corPos(p.v);
    var det = inadDet[p.ano] || {pct:0, inad:0, total:0};
    var dados = Math.round(det.inad)+'|'+Math.round(det.total);
    // círculo visível
    out += '<circle class="inad-dot" data-ano="'+p.ano+'" data-inad="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#0d1117" stroke="'+cor+'" stroke-width="1.8" style="cursor:pointer"/>';
    // área de hit invisível
    out += '<circle class="inad-dot" data-ano="'+p.ano+'" data-inad="'+dados+'" cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent" style="cursor:pointer"/>';
    // label do valor: acima do ponto
    out += '<text x="'+p.x+'" y="'+(p.y - 12)+'" text-anchor="middle" fill="'+cor+'" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">'+f2(p.v)+'%</text>';
  });

  // ---- eixo X: anos ----
  pts.forEach(function(p){
    var ehCur = (p.ano === S.ano);
    var cor = ehCur ? 'var(--blu)' : 'var(--dim)';
    var weight = ehCur ? '700' : '600';
    out += '<text x="'+p.x+'" y="'+(mgT+plotH+22)+'" text-anchor="middle" fill="'+cor+'" font-size="12" font-weight="'+weight+'" font-family="Plus Jakarta Sans,sans-serif">'+p.ano+(p.ano===2026?' YTD':'')+'</text>';
  });

  out += '</svg>';
  out += '</div>';

  out += '<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">';
  out += '<b style="color:var(--txt)">Limite tracejado em 2%</b>: teto de tolerância. ';
  out += '<span style="color:var(--grn)">Verde</span>: dentro do aceitável. ';
  out += '<span style="color:var(--red)">Vermelho</span>: acima do limite. ';
  out += 'Obs.: 2026 ainda tem muitos recebíveis em aberto — valor inicial, tende a cair conforme os pagamentos entram.';
  out += '</div>';
  out += '</div>';
  return out;
}

// ========== ALERTAS ESTRATÉGICOS ==========
function renderAlertas(){
  var ano = S.ano;
  var d = getDataAno(ano);
  var dAnt = getDataAno(ano-1);
  var alertas = [];

  // Concentração Top 5
  var clientes = getTopCliAno(ano);
  var top5 = clientes.slice(0,5).reduce(function(a,x){return a+x.fat;},0);
  var totalCli = clientes.reduce(function(a,x){return a+x.fat;},0);
  var pctCon = totalCli>0 ? top5/totalCli*100 : 0;
  if(pctCon>=60){
    alertas.push({t:'cr', b:'Concentração crítica em 5 clientes ('+f2(pctCon)+'%)', d:'perder um dos top 5 impacta severamente o caixa. Prioridade: diversificar carteira.'});
  } else if(pctCon>=45){
    alertas.push({t:'wa', b:'Concentração elevada em 5 clientes ('+f2(pctCon)+'%)', d:'monitorar e buscar diversificação de base.'});
  }

  // Queda de margem bruta
  if(dAnt && d.margem_bruta < dAnt.margem_bruta - 2){
    alertas.push({t:'wa', b:'Margem Bruta caiu '+f2(dAnt.margem_bruta - d.margem_bruta)+'pp vs ano anterior', d:'de '+f2(dAnt.margem_bruta)+'% para '+f2(d.margem_bruta)+'% — revisar precificação ou custos.'});
  }
  // Resultado negativo
  if(d.resultado < 0){
    alertas.push({t:'cr', b:'Resultado Gerencial negativo (R$ '+f(Math.abs(d.resultado))+' de prejuízo)', d:'empresa gerou menos do que gastou no período — atenção imediata.'});
  }
  // Crescimento forte
  if(dAnt && d.receita > dAnt.receita * 1.3){
    var pct = (d.receita/dAnt.receita-1)*100;
    alertas.push({t:'ok', b:'Crescimento forte de receita (+'+f2(pct)+'% vs ano anterior)', d:'acelerar operação e monitorar capital de giro para sustentar o ritmo.'});
  }
  // Retiradas sócios > resultado
  var ret = d.retiradas_socios || 0;
  var res = d.resultado || 0;
  if(ret > 0 && res > 0 && ret > res * 2){
    alertas.push({t:'wa', b:'Retiradas dos sócios muito acima do resultado', d:'retiradas de R$ '+f(ret)+' para um resultado de R$ '+f(res)+' — reservar parte como dividendo futuro?'});
  }
  if(ret > 0 && res < 0){
    alertas.push({t:'cr', b:'Sócios retirando com empresa no prejuízo', d:'retiradas de R$ '+f(ret)+' com resultado de −R$ '+f(Math.abs(res))+' — insustentável a médio prazo.'});
  }
  // PMR alto
  var pmrp = pmrPmpDoPeriodo(ano);
  if(pmrp && pmrp.pmr_efetivo !== null && pmrp.pmp_efetivo !== null){
    if(pmrp.pmr_efetivo > pmrp.pmp_efetivo + 5){
      alertas.push({t:'wa', b:'Ciclo financeiro negativo', d:'recebe em '+pmrp.pmr_efetivo+'d e paga em '+pmrp.pmp_efetivo+'d — pressiona capital de giro.'});
    }
  }
  // Produtos com margem baixa
  var produtos = getTopProdAno(ano);
  var baixaM = produtos.filter(function(p){return p.fat>0 && p.margem_pct<15;}).length;
  if(baixaM >= 10){
    alertas.push({t:'wa', b:baixaM+' produtos com margem abaixo de 15%', d:'revisar mix — produtos com margem baixa puxam a média para baixo.'});
  }
  // Clientes perdidos
  var coorte = getCoorteAno(ano);
  if(coorte && coorte.perdidos > coorte.novos + coorte.retornados){
    alertas.push({t:'wa', b:'Churn de clientes: '+coorte.perdidos+' perdidos vs '+(coorte.novos+coorte.retornados)+' novos/retornados', d:'base de clientes está encolhendo — investigar causas.'});
  }

  if(alertas.length===0){
    alertas.push({t:'ok', b:'Sem alertas críticos detectados', d:'todos os indicadores dentro do esperado no período analisado.'});
  }

  var out = '<div class="sc">ALERTAS ESTRATÉGICOS</div>';
  out += '<div class="card">';
  alertas.forEach(function(a){
    out += '<div class="al '+a.t+'"><div><b>'+a.b+'</b><span class="ad">'+a.d+'</span></div></div>';
  });
  out += '</div>';
  return out;
}

// === INIT ===
render();
</script>

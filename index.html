  h+='<div class="card ic"><div class="lb">Prazo Médio de Pagamento</div><div class="iv" style="color:var(--cya)">'+D.pmp+'<span class="iu"> dias</span></div><div style="font-size:9px;color:var(--dim);margin-top:3px">tempo que você leva para pagar</div></div>';
  h+='<div class="card ic"><div class="lb">Diferença Receber vs Pagar</div><div class="iv" style="color:var(--grn)">+'+gap+'<span class="iu"> dias</span></div><div style="font-size:9px;color:var(--dim);margin-top:3px">você paga depois de receber ✅</div></div>';
  h+='</div>';

  // ALERTAS
  h+='<div class="sc">Alertas e Recomendações</div><div class="card" style="margin-bottom:14px">';
  if(minSaldo>0){h+='<div class="al ok"><span style="font-size:14px">✅</span><div><b>Caixa saudável</b><span class="ad">Saldo positivo em todas as '+D.fluxo.length+' semanas projetadas. Mínimo: R$ '+f(minSaldo)+'</span></div></div>';}
  else{h+='<div class="al cr"><span style="font-size:14px">🔴</span><div><b>Atenção ao caixa</b><span class="ad">Saldo mínimo projetado: R$ '+f(minSaldo)+'. Antecipar recebíveis ou postergar pagamentos.</span></div></div>';}
  h+='<div class="al cr"><span style="font-size:14px">🔴</span><div><b>Inadimplência: R$ '+f(D.inadimplencia.total)+' ('+D.inadimplencia.n+' títulos)</b><span class="ad">R$ '+f(aT['>365d']||0)+' com mais de 1 ano. Acionar cobrança jurídica.</span></div></div>';
  h+='<div class="al cr"><span style="font-size:14px">🔴</span><div><b>'+dcLen+' clientes devendo e comprando</b><span class="ad">Exposição total: R$ '+f(dcExp)+'. Bloquear crédito.</span></div></div>';
  if(D.pagar.vencidas>0){h+='<div class="al wa"><span style="font-size:14px">🟡</span><div><b>R$ '+f(D.pagar.vencidas)+' em contas a pagar vencidas</b><span class="ad">'+D.pagar.n_vencidas+' títulos. Regularizar para evitar juros.</span></div></div>';}
  h+='<div class="al ok"><span style="font-size:14px">✅</span><div><b>Prazo de pagamento favorável (PMP '+D.pmp+'d > PMR '+D.pmr+'d)</b><span class="ad">Você recebe antes de pagar. Gap de +'+gap+' dias.</span></div></div>';
  h+='</div>';

  h+='<div class="ftr">BIGTEX • Painel Financeiro • Dados validados contra ERP • '+D.data_ref+' • Clique nos cards para expandir</div>';

  document.getElementById('app').innerHTML=h;
  var el=document.getElementById('bsc');
  if(el){el.addEventListener('input',function(){S.busca=this.value;var p=this.selectionStart;render();var n=document.getElementById('bsc');if(n){n.focus();n.setSelectionRange(p,p);}});}
}
render();
</script></body></html>

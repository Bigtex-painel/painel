      <div class="acc" style="background:var(--red)"></div>
      <div class="lbl">A Pagar (em aberto)</div>
      <div class="val" style="color:var(--red)">R$ ${f(busca?tAPf:D.pagar.aberto)}</div>
      <div class="sub">${busca?pi.length:D.pagar.n_aberto} títulos • ${f(D.pagar.vencidas)} vencidas</div>
      <span class="bdg" style="color:var(--blu);background:var(--blu-bg)">${f(D.pagar.abr_pago)} pago em abril</span>
      ${state.dd==='pagar'?'<div class="dd">'+pi.sort(function(a,b){return b.v-a.v}).slice(0,12).map(function(r){return '<div class="ddr"><span class="n">'+r.f.substring(0,30)+'</span><span class="v">'+f(r.v)+'</span></div>'}).join('')+'</div>':''}
    </div>

    <div class="card">
      <div class="acc" style="background:${D.fluxo[3].saldo>0?'var(--grn)':'var(--red)'}"></div>
      <div class="lbl">Projeção 30 dias</div>
      <div class="val" style="color:${D.fluxo[3].saldo>0?'var(--grn)':'var(--red)'}">R$ ${f(D.fluxo[3].saldo)}</div>
      <div class="sub">saldo projetado em 17/mai</div>
      ${semH(D.fluxo[3].saldo>0?'g':D.fluxo[1].saldo<0?'r':'y')}
      ${D.fluxo[3].saldo<0?'<span class="bdg" style="color:var(--red);background:var(--red-bg)">⚠ ATENÇÃO: saldo negativo</span>':'<span class="bdg" style="color:var(--grn);background:var(--grn-bg)">▲ Caixa confortável</span>'}
    </div>

    <div class="card click" onclick="toggle('inad')">
      <div class="acc" style="background:${D.inadimplencia.taxa>5?'var(--red)':'var(--yel)'}"></div>
      <div class="lbl">Inadimplência Total</div>
      <div class="val" style="color:${D.inadimplencia.taxa>5?'var(--red)':'var(--yel)'}">R$ ${f(busca?tVf:D.inadimplencia.total)}</div>
      <div class="sub">${D.inadimplencia.n_titulos} títulos • taxa ${D.inadimplencia.taxa}%</div>
      ${semH(D.inadimplencia.taxa<3?'g':D.inadimplencia.taxa<5?'y':'r')}
      <div class="aging-bar" style="margin-top:8px">
        ${aT['1-15d']>0?'<div style="width:'+(aT['1-15d']/aTot*100)+'%;background:var(--grn)">'+f(aT['1-15d'])+'</div>':''}
        ${aT['16-30d']>0?'<div style="width:'+(aT['16-30d']/aTot*100)+'%;background:var(--yel)">'+f(aT['16-30d'])+'</div>':''}
        ${aT['31-90d']>0?'<div style="width:'+(aT['31-90d']/aTot*100)+'%;background:var(--ora)">'+f(aT['31-90d'])+'</div>':''}
        ${aT['>90d']>0?'<div style="width:'+(aT['>90d']/aTot*100)+'%;background:var(--red)">'+f(aT['>90d'])+'</div>':''}
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;font-size:9px;color:var(--dim)"><span>🟢 1-15d</span><span>🟡 16-30d</span><span>🟠 31-90d</span><span>🔴 >90d</span></div>
      ${state.dd==='inad'?'<div class="dd">'+D.top_devedores.map(function(x){return '<div class="ddr"><span class="n"><span class="dot" style="background:'+(x.d>90?'var(--red)':x.d>30?'var(--ora)':'var(--yel)')+';box-shadow:0 0 5px '+(x.d>90?'var(--red)':x.d>30?'var(--ora)':'var(--yel)')+'"></span>'+x.c+'</span><span class="v" style="color:var(--red)">'+f(x.v)+' <small style="color:var(--dim)">'+x.d+'d</small></span></div>'}).join('')+'</div>':''}
    </div>

    <div class="card click" onclick="toggle('devcomp')">
      <div class="acc" style="background:${D.devedores_comprando.length?'var(--red)':'var(--grn)'}"></div>
      <div class="lbl">Devedores Comprando</div>
      <div class="val" style="color:var(--red)">${busca?dcF.length:D.devedores_comprando.length}</div>
      <div class="sub">com dívida vencida + vendas novas</div>
      ${semH(D.devedores_comprando.length>3?'r':D.devedores_comprando.length>0?'y':'g')}
      <span class="bdg" style="color:var(--red);background:var(--red-bg)">⚠ Bloquear crédito</span>
      ${state.dd==='devcomp'?'<div class="dd">'+D.devedores_comprando.map(function(x){return '<div class="dc"><div class="dcn">'+x.c+' <small style="color:var(--dim)">('+x.dias+'d atraso)</small></div><div class="dcd"><span>Deve: <b style="color:var(--red)">'+f(x.div)+'</b></span><span>Novas: <b style="color:var(--yel)">'+f(x.nov)+'</b></span><span>Exposição: <b style="color:var(--red)">'+f(x.div+x.nov)+'</b></span></div></div>'}).join('')+'</div>':''}
    </div>
  </div>

  <div class="sec">Fluxo de Caixa Projetado</div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;gap:16px;margin-bottom:8px">
      <span style="font-size:10px;color:var(--dim)"><span style="display:inline-block;width:10px;height:10px;background:var(--grn);border-radius:2px;margin-right:4px"></span>Entradas</span>
      <span style="font-size:10px;color:var(--dim)"><span style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:2px;margin-right:4px"></span>Saídas</span>
    </div>
    ${D.fluxo.map(function(fl){
      let hE=Math.max(8,fl.e/mx*70),hS=Math.max(8,fl.sa/mx*70);
      return '<div class="fluxo-row"><div><div style="font-weight:600;font-size:12px">'+fl.s+'</div><div style="font-size:9px;color:var(--mut)">'+fl.pr+'</div></div><div><div style="display:flex;align-items:flex-end;gap:3px;height:70px"><div style="display:flex;flex-direction:column;align-items:center;flex:1"><div class="fluxo-bar e" style="height:'+hE+'px;width:100%">'+f(fl.e)+'</div><div style="font-size:8px;color:var(--dim);margin-top:2px">Entra</div></div><div style="display:flex;flex-direction:column;align-items:center;flex:1"><div class="fluxo-bar s" style="height:'+hS+'px;width:100%">'+f(fl.sa)+'</div><div style="font-size:8px;color:var(--dim);margin-top:2px">Sai</div></div></div></div><div style="text-align:right"><div style="font-family:\'JetBrains Mono\',monospace;font-weight:700;font-size:14px;color:'+(fl.saldo>0?'var(--grn)':'var(--red)')+'">'+f(fl.saldo)+'</div><div style="font-size:9px;color:var(--dim)">saldo</div></div></div>';
    }).join('')}
    ${D.fluxo.some(function(fl){return fl.saldo<0})?'<div class="al cr" style="margin-top:10px"><span style="font-size:16px">🔴</span><div><b>ALERTA: Saldo negativo projetado</b><span class="ad">As saídas superam as entradas a partir da semana 2. Ação necessária: antecipar recebíveis ou renegociar pagamentos.</span></div></div>':''}
  </div>

  <div class="sec">Obrigações — Abril/2026</div>
  <div class="grid">
    <div class="card">
      <div class="lbl">Top Fornecedores — Valor Total no Mês</div>
      <div style="font-size:10px;color:var(--mut);margin-bottom:8px">✓ pago | ⏳ em aberto</div>
      ${D.fornecedores.map(function(x){
        let pct=x.total/(D.pagar.abr_total||1)*100;
        return '<div class="fr2"><span style="flex:1">'+x.f+'</span><div style="display:flex;align-items:center;gap:6px">'+(x.pago>0?'<span style="font-size:9px;color:var(--grn)">✓'+f(x.pago)+'</span>':'')+(x.aberto>0?'<span style="font-size:9px;color:var(--red)">⏳'+f(x.aberto)+'</span>':'')+'<span style="font-family:\'JetBrains Mono\',monospace;font-weight:700;font-size:12px">'+f(x.total)+'</span><span class="fp" style="color:var(--dim)">'+pct.toFixed(0)+'%</span></div></div>';
      }).join('')}
    </div>
    <div class="card">
      <div class="lbl">Despesas por Categoria</div>
      <div style="margin-top:8px">
        ${D.categorias.map(function(x,i){return '<div class="prog"><div class="progh"><span>'+x.cat+'</span><span class="progv">'+f(x.v)+'</span></div><div class="progb"><div class="progf" style="width:'+(x.v/maxCat*100)+'%;background:'+catC[i%6]+'"></div></div></div>'}).join('')}
      </div>
    </div>
  </div>

  <div class="sec">Indicadores de Prazo</div>
  <div class="ig">
    <div class="card ic"><div class="lbl">Prazo Médio de Recebimento</div><div class="iv" style="color:var(--yel)">${D.pmr}<span class="iu"> dias</span></div><div style="font-size:10px;color:var(--dim);margin-top:4px">tempo que o cliente leva para pagar</div></div>
    <div class="card ic"><div class="lbl">Prazo Médio de Pagamento</div><div class="iv" style="color:var(--cya)">${D.pmp}<span class="iu"> dias</span></div><div style="font-size:10px;color:var(--dim);margin-top:4px">tempo que você leva para pagar fornecedores</div></div>
    <div class="card ic"><div class="lbl">Diferença Receber vs Pagar</div><div class="iv" style="color:var(--grn)">+${gap}<span class="iu"> dias</span></div><div style="font-size:10px;color:var(--dim);margin-top:4px">você paga ${gap} dias depois de receber ✅</div></div>
  </div>

  <div class="sec">Alertas e Recomendações</div>
  <div class="card" style="margin-bottom:14px">
    ${D.fluxo.some(function(fl){return fl.saldo<0})?'<div class="al cr"><span style="font-size:16px">🔴</span><div><b>Saldo negativo projetado nas próximas semanas</b><span class="ad">Saídas de R$ '+f(D.fluxo[1].sa)+' na Sem 2 superam entradas de R$ '+f(D.fluxo[1].e)+'. Antecipar recebíveis ou postergar pagamentos.</span></div></div>':'<div class="al ok"><span style="font-size:16px">✅</span><div><b>Caixa saudável</b><span class="ad">Saldo positivo projetado</span></div></div>'}
    <div class="al cr"><span style="font-size:16px">🔴</span><div><b>Inadimplência alta: R$ ${f(D.inadimplencia.total)} (${D.inadimplencia.taxa}%)</b><span class="ad">${f(D.inadimplencia.aging['>90d'])} com mais de 90 dias de atraso. Acionar cobrança jurídica para casos antigos.</span></div></div>
    <div class="al cr"><span style="font-size:16px">🔴</span><div><b>${D.devedores_comprando.length} clientes devendo e comprando — exposição de R$ ${f(D.devedores_comprando.reduce(function(a,x){return a+x.div+x.nov},0))}</b><span class="ad">Bloquear vendas a prazo até quitação das pendências.</span></div></div>
    <div class="al wa"><span style="font-size:16px">🟡</span><div><b>R$ ${f(D.pagar.vencidas)} em contas a pagar vencidas (${D.pagar.n_vencidas} títulos)</b><span class="ad">Regularizar para evitar juros e protesto.</span></div></div>
    <div class="al ok"><span style="font-size:16px">✅</span><div><b>Prazo de pagamento favorável (PMP ${D.pmp}d > PMR ${D.pmr}d)</b><span class="ad">Você recebe dos clientes antes de pagar fornecedores. Gap de +${gap} dias.</span></div></div>
  </div>

  <div class="ftr">BIGTEX • Painel Financeiro • Dados reais: jan/2025 a abr/2026 • ${D.data_ref} • Clique nos cards para expandir</div>`;

  let el=document.getElementById('busca');
  if(el){el.addEventListener('input',function(e){state.busca=this.value;let p=this.selectionStart;render();let n=document.getElementById('busca');if(n){n.focus();n.setSelectionRange(p,p);}});}
}

function toggle(id){state.dd=state.dd===id?null:id;render();}
render();
</script>
</body>
</html>

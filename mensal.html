<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#161b22;--card-h:#1c2333;--brd:#21262d;--txt:#e6edf3;--dim:#8b949e;--mut:#484f58;--grn:#3fb950;--grn-bg:rgba(63,185,80,.12);--red:#f85149;--red-bg:rgba(248,81,73,.12);--yel:#d29922;--yel-bg:rgba(210,153,34,.12);--blu:#58a6ff;--blu-bg:rgba(88,166,255,.12);--cya:#39d2c0;--pur:#bc8cff;--ora:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif;padding:14px;-webkit-font-smoothing:antialiased}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--blu),var(--cya));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:3px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--brd)}
.nav a{font-size:11px;font-weight:600;padding:6px 14px;border-radius:8px;background:transparent;color:var(--dim);text-decoration:none;transition:all .15s}
.nav a.on{background:var(--blu);color:#fff}.nav a:hover:not(.on){color:var(--txt)}
.dt{color:var(--dim);font-size:11px;font-weight:500;background:var(--card);padding:4px 10px;border-radius:14px;border:1px solid var(--brd)}
.prow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.sel-wrap{display:flex;align-items:center;gap:6px}
.sel{background:var(--card);border:1px solid var(--brd);color:var(--txt);font-family:inherit;font-weight:600;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;outline:none}
.sel:focus{border-color:var(--blu)}
.ft{font-size:10px;color:var(--dim);background:var(--card);border:1px solid var(--brd);padding:3px 9px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.nav-btn{background:var(--card);border:1px solid var(--brd);color:var(--dim);font-family:inherit;font-weight:600;font-size:14px;width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover:not(:disabled){border-color:var(--blu);color:var(--blu)}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.kpigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;margin-bottom:14px}
.kcard{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kac{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.klb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:4px}
.kvl{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.kcomp{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:10px}
.kcomp span{font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.03)}
.up{color:var(--grn)}.dn{color:var(--red)}.neu{color:var(--dim)}
.sc{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px 4px;display:flex;align-items:center;gap:6px}
.sc::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--blu)}
.sc.fxsc::before{background:var(--mut)}.sc.fxsc{color:var(--mut)}
.sc.fxsc small{font-weight:400;text-transform:none;letter-spacing:.3px;color:var(--mut);font-size:10px;margin-left:6px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:15px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.card.fx{border-style:dashed}
.tblwrap{overflow-x:auto}
.dre{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.dre td,.dre th{padding:7px 10px;text-align:right;border-bottom:1px solid var(--brd)}
.dre th{text-align:center;font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dre td.l{text-align:left;font-weight:500}
.dre td.vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.dre td.pct{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:11px}
.dre tr.sec td{padding-top:10px;font-weight:700;border-bottom:2px solid var(--brd)}
.dre tr.sub td.l{padding-left:22px;color:var(--dim);font-weight:400;font-size:11px}
.dre tr.totgreen td.vl{color:var(--grn)}
.dre tr.totred td.vl{color:var(--red)}
.dre tr.totblue td.vl{color:var(--blu)}
.dre tr.totpur td.vl{color:var(--pur)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:12px}
.fr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);font-size:11px;gap:8px}.fr:last-child{border-bottom:none}
.fr .lft{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fr .rgt{display:flex;gap:10px;align-items:center;flex-shrink:0}
.fr .vl{font-family:'JetBrains Mono',monospace;font-weight:600}
.fr .delta{font-size:9px;font-family:'JetBrains Mono',monospace;min-width:44px;text-align:right}
.prog{margin-bottom:8px}.prh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;gap:6px}
.prh .cat{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prv{font-family:'JetBrains Mono',monospace;font-weight:600}
.prb{background:var(--brd);border-radius:3px;height:5px;overflow:hidden;position:relative}
.prf{height:100%;border-radius:3px;transition:width .3s}
.prdelta{font-size:9px;font-family:'JetBrains Mono',monospace;margin-left:6px}
.al{display:flex;gap:9px;padding:9px 11px;border-radius:6px;margin-bottom:5px;font-size:11px;line-height:1.35}
.al.ok{background:var(--grn-bg);border-left:3px solid var(--grn)}
.al.cr{background:var(--red-bg);border-left:3px solid var(--red)}
.al.wa{background:var(--yel-bg);border-left:3px solid var(--yel)}
.al b{display:block;margin-bottom:1px}.al .ad{color:var(--dim)}
.ftr{text-align:center;color:var(--mut);font-size:9px;padding:14px 0 6px;letter-spacing:.4px}
.meta-line{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--dim);flex-wrap:wrap;margin-top:6px}
.meta-line input{width:100px;padding:3px 7px;border-radius:5px;border:1px solid var(--brd);background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;outline:none}
.meta-line input:focus{border-color:var(--blu)}
.metabar{background:var(--brd);border-radius:3px;height:6px;overflow:hidden;position:relative;flex:1;min-width:80px;max-width:140px}
.metafill{height:100%;border-radius:3px}
.gauge{display:flex;align-items:center;gap:8px;margin-top:4px}
.gaugeval{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
@media(max-width:600px){.kvl{font-size:18px}.hdr h1{font-size:17px}}

/* Gráfico de faturamento diário */
.barchart{display:flex;align-items:flex-end;gap:2px;height:90px;padding-top:14px}
.barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.barchart .bar{width:100%;border-radius:2px 2px 0 0;background:linear-gradient(180deg,var(--blu),#1a5399);min-height:2px;position:relative}
.barchart .bar.hi{background:linear-gradient(180deg,var(--grn),#238636)}
.barchart .day{font-size:7px;color:var(--mut);font-family:'JetBrains Mono',monospace}
.barchart .tip{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--grn);font-family:'JetBrains Mono',monospace;font-weight:700;white-space:nowrap}

  if(saltos.length>0){
    saltos.sort(function(a,b){return b.v-a.v;});
    var det=saltos.slice(0,3).map(function(s){return s.d+' (+'+f2(s.dlt)+'%, R$ '+f(s.v)+')';}).join(' • ');
    alertas.push({t:'wa',ic:'🟡',b:saltos.length+' categoria(s) de despesa com salto >20% vs mês anterior',d:'Top 3: '+det+(saltos.length>3?' • +'+(saltos.length-3)+' outras':'')});
  }
  // Positivo: todas metas batidas
  if(m.resultado>0 && metaMB>0 && m.margem_bruta>=metaMB && metaML>0 && m.margem_liquida>=metaML){
    alertas.push({t:'ok',ic:'✅',b:'Mês com resultado gerencial positivo',d:'Lucro de R$ '+f(m.resultado)+' com margem líquida de '+f2(m.margem_liquida)+'%.'});
  }
  
  if(alertas.length===0){
    alertas.push({t:'ok',ic:'✅',b:'Nenhum alerta crítico',d:'Mês operou dentro dos parâmetros esperados.'});
  }
  
  alertas.forEach(function(a){
    h+='<div class="al '+a.t+'"><span style="font-size:14px">'+a.ic+'</span><div><b>'+a.b+'</b><span class="ad">'+a.d+'</span></div></div>';
  });
  h+='</div>';
  
  // === BLOCO FIXO: EVOLUÇÃO 12 MESES ===
  h+='<div class="sc fxsc">Contexto Histórico <small>(últimos 12 meses — não afetado pelo filtro)</small></div>';
  h+='<div class="card fx"><div class="klb" style="margin-bottom:10px">Evolução Receita vs Resultado (12m)</div>';
  var ult12=mesesOrdenados().slice(-12);
  var maxRec=Math.max.apply(null,ult12.map(function(y){return D.meses[y].receita;}));if(!maxRec)maxRec=1;
  var minRes=Math.min.apply(null,ult12.map(function(y){return D.meses[y].resultado;}));
  var maxRes=Math.max.apply(null,ult12.map(function(y){return D.meses[y].resultado;}));
  var w=720,hSvg=220,padL=48,padR=15,padT=18,padB=45;
  var innerW=w-padL-padR, innerH=hSvg-padT-padB;
  var colW=innerW/ult12.length;
  h+='<svg viewBox="0 0 '+w+' '+hSvg+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:220px">';
  // Grid
  for(var g=0;g<=3;g++){
    var gy=padT+(innerH/3)*g;
    h+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#21262d" stroke-dasharray="2,2"/>';
    var v=maxRec*(1-g/3);
    h+='<text x="'+(padL-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#6e7681" font-family="JetBrains Mono" font-size="8">'+Math.round(v/1000)+'k</text>';
  }
  // Barras de receita
  var barW=colW*0.55;
  ult12.forEach(function(ym,i){
    var mm=D.meses[ym];
    var cx=padL+colW*(i+0.5);
    var hBar=(mm.receita/maxRec)*innerH;
    var yBar=padT+innerH-hBar;
    var cor=ym===S.mes?'url(#grRecHi)':'url(#grRec)';
    h+='<rect x="'+(cx-barW/2)+'" y="'+yBar+'" width="'+barW+'" height="'+hBar+'" fill="'+cor+'" rx="2"/>';
    // Label
    h+='<text x="'+cx+'" y="'+(padT+innerH+14)+'" text-anchor="middle" fill="'+(ym===S.mes?'var(--blu)':'#e6edf3')+'" font-family="Plus Jakarta Sans" font-weight="'+(ym===S.mes?'700':'500')+'" font-size="9">'+nomeM(ym)+'</text>';
    h+='<text x="'+cx+'" y="'+(padT+innerH+26)+'" text-anchor="middle" fill="#6e7681" font-family="JetBrains Mono" font-size="7">'+Math.round(mm.receita/1000)+'k</text>';
  });
  // Linha de resultado (superposta)
  // Escala separada para resultado
  var resRange=Math.max.apply(null,ult12.map(function(y){return Math.abs(D.meses[y].resultado);}));
  if(!resRange)resRange=1;
  function yRes(v){
    // 0 fica em 60% da altura (dá espaço pra negativos)
    var y0=padT+innerH*0.7;
    return y0-(v/resRange)*innerH*0.5;
  }
  var pts=ult12.map(function(ym,i){
    return {x:padL+colW*(i+0.5), y:yRes(D.meses[ym].resultado), v:D.meses[ym].resultado, ym:ym};
  });
  var linePath='M '+pts.map(function(p){return p.x+','+p.y;}).join(' L ');
  h+='<path d="'+linePath+'" fill="none" stroke="#39d2c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  pts.forEach(function(p){
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#0d1117" stroke="#39d2c0" stroke-width="2"/>';
  });
  h+='<defs>';
  h+='<linearGradient id="grRec" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#58a6ff" stop-opacity="0.7"/><stop offset="100%" stop-color="#1a5399" stop-opacity="0.7"/></linearGradient>';
  h+='<linearGradient id="grRecHi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#1a5399"/></linearGradient>';
  h+='</defs></svg>';
  h+='<div style="display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:10px;color:var(--dim)"><span><span style="display:inline-block;width:10px;height:10px;background:var(--blu);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Receita</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--cya);border-radius:50%;margin-right:4px;vertical-align:middle"></span>Resultado Gerencial</span></div>';
  h+='</div>';
  
  h+='<div class="ftr">BIGTEX • Painel Mensal • DRE gerencial construída dos dados ERP • '+D.data_ref+'</div>';
  
  document.getElementById('app').innerHTML=h;
}

render();
</script></body></html>
